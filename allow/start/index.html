<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <title>Portal</title>
</head>
<body>
  
      <portal>
        <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    
 
  <div id="portal-container">
    <div class="perspective-box">
      <div id="warp-scene" class="warp-scene"></div>
    </div>
    
    <div class="interaction-wrapper">
      <div id="input-stage" class="stage">
        <input type="text" id="user-input" placeholder="What's your name?" autocomplete="off" />
      </div>
      <div id="button-stage" class="stage hidden-under">
        <button id="warp-btn" ui-action="button">Continue</button>
      </div>
    </div>

    <div id="overlay" class="overlay">
      <div id="brand-text"></div>
    </div>
  </div>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap');

    :root {
      --brand-yellow: #FFC800;
      --brand-blue: #1CB0F6;
      --dark-yellow: #E5A500;
      --bg-space: #0A0A0A;
    }

    body {
      
      background: rgb(8, 20, 48);
                font-family: 'DIN Round', 'Nunito', sans-serif; 
    
    }

    portal #portal-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-space);
      z-index: 9999;
      overflow: hidden;
   }

    /* Responsive Flex Column */
   portal .interaction-wrapper {
      position: relative;
      z-index: 100;
      width: 90%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      flex-wrap: wrap; /* Responsive wrapping */
      gap: 15px;
      align-items: center;
    }

   portal .stage { width: 100%; }

   portal .perspective-box {
      position: absolute;
      perspective: 600px;
      width: 100vw;
      height: 100vh;
    }

   portal .warp-scene {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.1s ease-out;
    }

    /* Space Particles */
   portal .fragment {
      position: absolute;
      background: rgb(255, 255, 255);
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
    }

   portal .fragment.yellow { background: var(--brand-yellow); box-shadow: 0 0 8px var(--brand-yellow); }
   portal .fragment.blue { background: var(--brand-blue); box-shadow: 0 0 8px var(--brand-blue); }
   portal .fragment.white { background: #FFF; box-shadow: 0 0 8px #FFF; }

    @keyframes flyPast {
      0% { transform: translate3d(var(--x), var(--y), -1500px); opacity: 0; }
      15% { opacity: 0.8; }
      85% { opacity: 0.8; }
      100% { transform: translate3d(var(--mx), var(--my), 600px); opacity: 0; }
    }

    #user-input {
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      border: 3px solid #222;
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 1.1rem;
      text-align: center;
      outline: none;
      box-sizing: border-box;
                font-family: 'DIN Round', 'Nunito', sans-serif; 
    
    }

   portal .hidden-under {
      opacity: 0;
      transform: translateY(15px);
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
   portal .hidden-under.reveal { opacity: 1; transform: translateY(0); pointer-events: auto; }

    [ui-action="button"] {
      width: 100%;
      background: var(--brand-yellow);
           background: linear-gradient(180deg, #ffd700 0%, #ffbf00 100%);
          font-family: 'DIN Round', 'Nunito', sans-serif; 
    
      color: #333;
      border: 2px solid #ffde6b;
      border-bottom: 5px solid var(--dark-yellow);
      padding: 18px;
      border-radius: 16px;
      font-weight: 900;
      cursor: pointer;
      font-size: 1em;;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

   portal .overlay {
      position: fixed;
      inset: 0;
      background: rgb(8, 20, 48);
      opacity: 0;
      z-index: 200;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

   portal .flash { animation: portalWhite 0.8s forwards ease-in; }
    @keyframes portalWhite { to { opacity: 1; } }

    #brand-text { text-align: center; opacity: 0; transition: opacity 0.5s ease; }
   portal .hue-style { font-family: sans-serif; font-weight: 700; font-size: 2.2rem; 
      color: #fafafa; }
   portal .allwrite-style { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 2em; color: var(--brand-yellow); }
    
   portal .fade-in { opacity: 1 !important; }

   portal .hyper-drive .fragment {
      animation-duration: 0.4s !important;
    }
  </style>

  <script>
    const scene = document.getElementById('warp-scene');
    const input = document.getElementById('user-input');
    const buttonStage = document.getElementById('button-stage');
    const warpBtn = document.getElementById('warp-btn');
    const container = document.getElementById('portal-container');
    const overlay = document.getElementById('overlay');
    const brandText = document.getElementById('brand-text');

    // Mouse Parallax
    window.addEventListener('mousemove', (e) => {
      const x = (e.clientX - window.innerWidth / 2) / 30;
      const y = (e.clientY - window.innerHeight / 2) / 30;
      scene.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
    });

    // Generate Multicolored Fragments
    const colors = ['yellow', 'blue', 'white'];
    for (let i = 0; i < 50; i++) {
      const frag = document.createElement('div');
      const color = colors[Math.floor(Math.random() * colors.length)];
      frag.className = `fragment ${color}`;
      
      // Random sizes for depth
      const size = Math.random() * 6 + 2;
      frag.style.width = `${size}px`;
      frag.style.height = `${size}px`;
      if(Math.random() > 0.7) frag.style.width = `${size * 4}px`; // occasional bars

      const x = (Math.random() - 0.5) * 1200;
      const y = (Math.random() - 0.5) * 1200;
      frag.style.setProperty('--x', `${x}px`);
      frag.style.setProperty('--y', `${y}px`);
      frag.style.setProperty('--mx', `${x * 4}px`);
      frag.style.setProperty('--my', `${y * 4}px`);
      frag.style.left = '50%';
      frag.style.top = '50%';
      frag.style.animation = `flyPast ${2 + Math.random() * 2}s linear infinite`;
      frag.style.animationDelay = `${Math.random() * 5}s`;
      scene.appendChild(frag);
    }

    input.addEventListener('input', (e) => {
      if (e.target.value.trim().length > 0) buttonStage.classList.add('reveal');
      else buttonStage.classList.remove('reveal');
      localStorage.setItem('user_name',  document.querySelector('#user-input').value.trim()); 
    });

    warpBtn.addEventListener('click', () => {
      localStorage.setItem('user_name',document.querySelector('#user-input').value.trim()); 

      container.classList.add('hyper-drive');
      input.parentElement.style.opacity = '0';
      buttonStage.style.opacity = '0';

      setTimeout(() => overlay.classList.add('flash'), 500);

      setTimeout(() => {
        brandText.innerText = 'hue';
        brandText.className = 'hue-style fade-in';
      }, 1200);

      setTimeout(() => {
        brandText.classList.remove('fade-in');
        setTimeout(() => {
          brandText.innerText = 'AllWrite';
          brandText.className = 'allwrite-style fade-in';
        }, 500);
      }, 3200);

      setTimeout(() => {
        container.style.opacity = '0';
        container.style.transition = '1s';
        localStorage.setItem('portal_done', 'true');
        setTimeout(() => container.remove(), 1000);
      }, 5500);
            setTimeout(() => {
       window.location="https://allwrite-sh.vercel.app/allow/"
      }, 6000);
    });
    
  </script>

  <recheck>
    <script>


if (
  localStorage.getItem('portal_done') == 'true' &&
  localStorage.getItem('user_name') !== ''
) {
  window.location.replace('https://allwrite-sh.vercel.app/allow/new');
}

    </script>
</recheck> 
</portal>
</body>
</html>
