  <script>
    (function() {
      // 1. Inject Styles
      const style = document.createElement('style');
      style.textContent = `
        list-co { 
          display: flex; 
          flex-direction: column; 
          gap: 12px; 
          padding: 10px; 
          width: 100%;
          box-sizing: border-box;
        }

        @keyframes listIn {
          0% { opacity: 0; transform: translateX(-20px); }
          100% { opacity: 1; transform: translateX(0); }
        }

        .duo-button {
          width: 100%;
          box-sizing: border-box;
          appearance: none;
          border: 2px solid rgba(0,0,0,0.1);
          border-radius: 16px;
          cursor: pointer;
          font-family: Arial, sans-serif;
          font-size: 15px;
          font-weight: bold;
          padding: 16px 20px;
          text-transform: uppercase;
          position: relative;
          transition: all 0.1s;
          outline: none;
          opacity: 0;
          animation: listIn 0.5s ease forwards;
        }

        .duo-button:active {
          border-bottom-width: 2px !important;
          transform: translateY(4px);
        }
      `;
      document.head.appendChild(style);

      // 2. Attach Function to Window
      window.renderList = function(selector, items) {
        const containers = document.querySelectorAll(selector);
        
        containers.forEach(container => {
          // Clear to replace or remove line to append
          container.innerHTML = ''; 

          items.forEach((item, index) => {
            const btn = document.createElement('button');
            btn.className = 'duo-button';
            btn.textContent = item.label;
            btn.style.animationDelay = `${index * 0.1}s`;

            // Dynamic Colors
            btn.style.backgroundColor = item.color || '#ffffff';
            btn.style.borderBottom = `6px solid ${item.shadow || '#e5e5e5'}`;
            btn.style.color = item.textColor || '#4b4b4b';

            // Optional: Handle click if provided in config
            if(item.action) btn.onclick = item.action;

            container.appendChild(btn);
          });
          container.dataset.rendered = "true";
        });
      };

<shee-t>
  <script>
    (function() {
      const DUO_PALETTE = {
        green:   { bg: '#58cc02', shadow: '#46a302', text: '#ffffff' },
        blue:    { bg: '#1cb0f6', shadow: '#1899d6', text: '#ffffff' },
        red:     { bg: '#ff4b4b', shadow: '#cc3c3c', text: '#ffffff' },
        gold:    { bg: '#ffc800', shadow: '#e5a500', text: '#ffffff' },
        purple:  { bg: '#ce82ff', shadow: '#a560d6', text: '#ffffff' },
        white:   { bg: '#ffffff', shadow: '#e5e5e5', text: '#4b4b4b' },
        gray:    { bg: '#afafaf', shadow: '#888888', text: '#ffffff' }
      };

      const style = document.createElement('style');
      style.textContent = `
        shee-t {
          --sheet-bg: #ffffff;
          --overlay-color: rgba(0, 0, 0, 0.5); 
          --handle-color: #e5e5e5;
          --duo-text: #4b4b4b;
          font-family: Arial, sans-serif;
        }

        /* Shared Button Style */
        .duo-btn-base {
          padding: 15px 25px;
          border-radius: 16px;
          border: 2px solid rgba(0,0,0,0.05);
          font-family: Arial, sans-serif;
          font-size: 17px;
          font-weight: 800;
          text-transform: uppercase;
          cursor: pointer;
          transition: all 0.1s;
          outline: none;
          position: relative;
          display: inline-block;
          text-align: center;
        }
        .duo-btn-base:active { transform: translateY(4px); box-shadow: none !important; }

        /* Trigger specific */
        .duo-trigger {
          background: #ffffff;
          color: #afafaf;
          box-shadow: 0 4px 0 #e5e5e5;
          border: 2px solid #e5e5e5;
        }

        .sheet-overlay {
          position: fixed; inset: 0; background: var(--overlay-color);
          z-index: 2000; opacity: 0; visibility: hidden; transition: opacity 0.3s ease;
        }
        .sheet-container {
          position: fixed; left: 0; right: 0; bottom: 0;
          background: var(--sheet-bg); z-index: 2001;
          border-radius: 24px 24px 0 0; padding: 12px 20px 30px;
          transform: translateY(110%); transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1);
          max-height: 85vh; border-top: 2px solid #e5e5e5;
          display: flex; flex-direction: column;
        }
        .sheet-overlay.active { opacity: 1; visibility: visible; }
        .sheet-container.active { transform: translateY(0); }
        .sheet-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; flex-shrink: 0; }
        .sheet-handle { width: 40px; height: 6px; background: var(--handle-color); border-radius: 20px; margin-bottom: 10px; }
        .sheet-title { font-size: 24px; font-weight: 800; margin: 5px 0; color: var(--duo-text); }
        .sheet-body { overflow-y: auto; padding-bottom: 20px; color: var(--duo-text); flex-grow: 1; }
        .sheet-footer { display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
      `;
      document.head.appendChild(style);

      class DuoSheet extends HTMLElement {
        connectedCallback() {
          this.innerHTML = `
            <div class="sheet-overlay"></div>
            <div class="sheet-container">
              <div class="sheet-header">
                <div class="sheet-handle"></div>
                <h2 class="sheet-title"></h2>
              </div>
              <div class="sheet-body"></div>
              <div class="sheet-footer"></div>
            </div>
          `;
          this.overlay = this.querySelector('.sheet-overlay');
          this.container = this.querySelector('.sheet-container');
          this.titleEl = this.querySelector('.sheet-title');
          this.bodyEl = this.querySelector('.sheet-body');
          this.footerEl = this.querySelector('.sheet-footer');
          this.overlay.onclick = () => this.close();
        }

        open(config) {
          this.titleEl.textContent = config.title || "Hello!";
          this.bodyEl.innerHTML = config.body || "";
          this.footerEl.innerHTML = ""; 

          const buttons = config.buttons || [{ text: "Continue", color: "green" }];

          buttons.forEach(btnData => {
            const btn = document.createElement('button');
            btn.className = 'duo-btn-base';
            btn.textContent = btnData.text;
            
            const theme = DUO_PALETTE[btnData.color] || { bg: btnData.color, shadow: 'rgba(0,0,0,0.2)', text: btnData.textColor || 'white' };
            
            btn.style.backgroundColor = theme.bg;
            btn.style.color = btnData.textColor || theme.text;
            btn.style.boxShadow = `0 5px 0 ${theme.shadow}`;
            btn.style.width = "100%"; // Footer buttons are full width
            
            btn.onclick = () => {
              if (btnData.action) btnData.action();
              this.close();
            };
            this.footerEl.appendChild(btn);
          });

          this.container.classList.add('active');
          this.overlay.classList.add('active');
          document.body.style.overflow = 'hidden';
        }

        close() {
          this.container.classList.remove('active');
          this.overlay.classList.remove('active');
          document.body.style.overflow = '';
        }
      }

      customElements.define('shee-t', DuoSheet);
      window.openSheet = (config) => document.querySelector('shee-t')?.open(config);
    })();
  </script>
</shee-t>

  <script>
    (function() {
      const style = document.createElement('style');
      style.textContent = `
        moti-co {
          position: fixed; left: -450px; bottom: 40px; z-index: 9999;
          display: flex; align-items: center; gap: 15px;
          background: white; padding: 12px 20px; border-radius: 18px;
          border: 2px solid #e5e5e5; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
          transition: left 0.4s cubic-bezier(0.32, 0.72, 0, 1), transform 0.1s;
          font-family: Arial, sans-serif; max-width: 320px;
          pointer-events: none; cursor: grab; user-select: none; touch-action: none;
        }
        moti-co.active { left: 20px; pointer-events: auto; }
        moti-co:active { cursor: grabbing; }
        .moti-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; flex-shrink: 0; pointer-events: none; }
        .moti-text { color: #4b4b4b; font-size: 15px; font-weight: 700; margin: 0; line-height: 1.4; pointer-events: none; }
        .moti-sub { color: #afafaf; font-size: 12px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; pointer-events: none; }
      `;
      document.head.appendChild(style);

      class MotiCo extends HTMLElement {
        connectedCallback() {
          this.innerHTML = `
            <img src="" class="moti-avatar" id="moti-img">
            <div>
              <div class="moti-sub" id="moti-title">Motivation</div>
              <p class="moti-text" id="moti-msg"></p>
            </div>
          `;
        }
      }
      customElements.define('moti-co', MotiCo);

      const el = document.querySelector('moti-co');
      let hideTimeout;
      
      // Drag & Dismiss Logic
      let isDragging = false; let startX = 0;
      const startDrag = (e) => { 
        isDragging = true; 
        startX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        el.style.transition = 'none';
      };
      const moveDrag = (e) => {
        if (!isDragging) return;
        const currentX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const deltaX = currentX - startX;
        if (deltaX < 0) {
          el.style.transform = `translateX(${deltaX}px)`;
          if (deltaX < -100) { isDragging = false; el.classList.remove('active'); }
        }
      };
      const endDrag = () => {
        isDragging = false;
        el.style.transition = 'left 0.4s cubic-bezier(0.32, 0.72, 0, 1), transform 0.3s';
        el.style.transform = `translateX(0px)`;
      };

      el.addEventListener('mousedown', startDrag);
      window.addEventListener('mousemove', moveDrag);
      window.addEventListener('mouseup', endDrag);
      el.addEventListener('touchstart', startDrag);
      window.addEventListener('touchmove', moveDrag);
      window.addEventListener('touchend', endDrag);

      // Global Trigger Function
      window.triggerMoti = function(config = {}) {
        const defaults = {
          img: charImg,
          title: 'Motivation',
          msg: "You're doing great! Keep going!"
        };

        const show = () => {
          document.getElementById('moti-img').src = config.img || defaults.img;
          document.getElementById('moti-title').textContent = config.title || defaults.title;
          document.getElementById('moti-msg').textContent = config.msg || defaults.msg;
          
          el.style.transform = `translateX(0px)`;
          el.classList.add('active');

          clearTimeout(hideTimeout);
          hideTimeout = setTimeout(() => el.classList.remove('active'), 5000);
        };

        if (el.classList.contains('active')) {
          el.classList.remove('active');
          setTimeout(show, 400); 
        } else {
          show();
        }
      };
    })();
  </script>
</moti-co>

  <script>
    (function() {
      const playSound = (type) => {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          if (type === 'correct') {
            osc.frequency.setValueAtTime(523, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
          } else {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, ctx.currentTime);

        .input-display { width: 100%; padding: 15px; border: 2px solid #e5e5e5; border-radius: 16px; font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 12px; background: #f7f7f7; min-height: 60px; box-sizing: border-box; color: #1cb0f6; border-bottom: 4px solid #e5e5e5; word-break: break-word; white-space: pre-wrap; }
        .kb-container { background: #e5e5e5; padding: 10px; border-radius: 16px; display: flex; flex-direction: column; gap: 8px; }
        .kb-row { display: flex; justify-content: center; gap: 4px; }
        .kb-key { flex: 1; min-width: 0; padding: 12px 0; background: white; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #afafaf; font-size: 14px; color: #4b4b4b; }
        .kb-key:active { transform: translateY(2px); box-shadow: 0 1px 0 #afafaf; }
        .kb-key.active { background: #1cb0f6; color: white; box-shadow: 0 3px 0 #168ec6; }
        .kb-key.wide { flex: 1.5; }
        .kb-key.space { flex: 5; }
        #check-btn { background: #58cc02; color: white; border-color: #58cc02; box-shadow: 0 5px 0 #46a302; text-align: center; }
        .feedback { text-align: center; font-weight: 800; margin-top: 20px; font-size: 20px; min-height: 28px; text-transform: uppercase; }
        .q-hint { font-size: 13px; color: #afafaf; text-align: center; margin-bottom: 10px; font-style: italic; }
      `;
      document.head.appendChild(style);

      class QuestIon extends HTMLElement {
        connectedCallback() {
          this.innerHTML = `
            <div class="q-title" id="q-text"></div>
            <div class="q-hint" id="q-hint"></div>
            <div id="q-content"></div>
            <div id="q-actions" style="display:none; margin-top:25px;">
              <button class="q-btn" id="check-btn">CHECK</button>
            </div>
            <div class="feedback" id="feedback"></div>
          `;
          this.querySelector('#check-btn').onclick = () => this.validate();
          this.isShift = true;
        }

        loadQuestion(data) {
          this.classList.remove('fade-out');
          this.currentData = data;
          this.userVal = "";
          this.isShift = true;
          this.querySelector('#feedback').textContent = '';
          this.querySelector('#q-hint').textContent = data.hint || '';

          const content = this.querySelector('#q-content');
          const actions = this.querySelector('#q-actions');
          this.querySelector('#q-text').textContent = data.question;
          content.innerHTML = '';
          actions.style.display = (data.type === 'reorder' || data.type === 'input') ? 'block' : 'none';

          if (data.type === 'reorder') {
            const zone = document.createElement('div'); zone.className = 'reorder-zone';
            [...data.options].sort(() => Math.random() - 0.5).forEach(opt => {
              const p = document.createElement('div'); p.className = 'word-pill'; p.draggable = true; p.textContent = opt;
              p.ondragstart = () => p.classList.add('dragging'); p.ondragend = () => p.classList.remove('dragging');
              zone.appendChild(p);
            });
            zone.ondragover = (e) => {
              e.preventDefault();
              const drag = zone.querySelector('.dragging');
              const sibs = [...zone.querySelectorAll('.word-pill:not(.dragging)')];
              const next = sibs.find(s => { const b = s.getBoundingClientRect(); return e.clientX <= b.left + b.width/2 && e.clientY <= b.top + b.height/2; });
              zone.insertBefore(drag, next);
            };
            content.appendChild(zone);
          }
          else if (data.type === 'choice') {
            const grid = document.createElement('div'); grid.className = 'choice-grid';
            [...data.options].sort(() => Math.random() - 0.5).forEach(opt => {
              const b = document.createElement('button'); b.className = 'q-btn'; b.textContent = opt;
              b.onclick = () => { this.userVal = opt; this.validate(b); };
              grid.appendChild(b);
            });
            content.appendChild(grid);
          }
          else if (data.type === 'input') {
            const disp = document.createElement('div'); disp.className = 'input-display'; disp.id = 'input-disp';
            disp.textContent = '';
            const kbContainer = document.createElement('div'); kbContainer.className = 'kb-container';

            const renderKeys = () => {
              kbContainer.innerHTML = '';
              const rows = [
                "QWERTYUIOP".split(''),
                "ASDFGHJKL".split(''),
                ["SHIFT", ..."ZXCVBNM".split(''), "BACKSPACE"],
                [".", "!", "?", ";", ",", ":", '"', "'"],
                ["CLEAR", "SPACE"]
              ];
              rows.forEach(row => {
                const rowDiv = document.createElement('div'); rowDiv.className = 'kb-row';
                row.forEach(key => {
                  const k = document.createElement('button'); k.className = 'kb-key';
                  if (key === "SHIFT") {
                    k.innerHTML = '<i class="fas fa-arrow-up"></i>';
                    if (this.isShift) k.classList.add('active');
                    k.onclick = () => { this.isShift = !this.isShift; renderKeys(); };
                  } else if (key === "BACKSPACE") {
                    k.innerHTML = '<i class="fas fa-backspace"></i>'; k.classList.add('wide');
                    k.onclick = () => {
                      this.userVal = this.userVal.slice(0, -1);
                      if (this.userVal.length === 0) this.isShift = true;
                      disp.textContent = this.userVal; renderKeys();
                    };
                  } else if (key === "SPACE") {
                    k.textContent = 'SPACE'; k.classList.add('space');
                    k.onclick = () => {
                      if (this.userVal.slice(-1) !== ' ') { this.userVal += ' '; disp.textContent = this.userVal; }
                    };
                  } else if (key === "CLEAR") {
                    k.innerHTML = '<i class="fas fa-trash-can"></i>'; k.classList.add('wide');
                    k.onclick = () => { this.userVal = ''; this.isShift = true; disp.textContent = ''; renderKeys(); };
                  } else {
                    const char = this.isShift ? key : key.toLowerCase();
                    k.textContent = char;
                    k.onclick = () => {
                      this.userVal += char;
                      disp.textContent = this.userVal;
                      if ([".", "!", "?", ";"].includes(char)) { this.isShift = true; }
                      else if (this.isShift) { this.isShift = false; }
                      renderKeys();
                    };
                  }
                  rowDiv.appendChild(k);
                });
                kbContainer.appendChild(rowDiv);
              });
            };
            renderKeys();
            content.append(disp, kbContainer);
          }
        }

        validate(btn = null) {
          const fb = this.querySelector('#feedback');
          const checkBtn = this.querySelector('#check-btn');
          const data = this.currentData;
          let ok = false;
          let failMsg = "Not quite right";

          const input = this.userVal.trim();
          const target = (data.answer || '').trim();
          const isAny = target === '' || target.toUpperCase() === 'ANY';

          if (data.type === 'reorder') {
            const cur = [...this.querySelectorAll('.word-pill')].map(el => el.textContent);
            ok = JSON.stringify(cur) === JSON.stringify(data.answer);
          }
          else if (data.type === 'input') {
            const isCapitalized = /^[A-Z]/.test(input);
            const hasPunctuation = /[.!?,;]$/.test(input);
            const noDoubleSpace = !/  /.test(input);
            const hasContent = input.length > 0;

            if (!hasContent) { failMsg = "Please write something!"; ok = false; }
            else if (!isCapitalized) { failMsg = "Start with a capital letter!"; ok = false; }
            else if (!hasPunctuation) { failMsg = "End with . ! ? or ,"; ok = false; }
            else if (!noDoubleSpace) { failMsg = "No double spaces!"; ok = false; }
            else if (isAny) {
              const mustContain = data.contains || [];
              const missing = mustContain.filter(word => !input.includes(word));
              if (missing.length > 0) { failMsg = `Include the word: "${missing[0]}"`; ok = false; }
              else { ok = true; }
            }
            else {
              ok = input === target;
              if (!ok) failMsg = "Not quite right";
            }
          }
          else {
            ok = this.userVal === target;
          }

          playSound(ok ? 'correct' : 'error');

          fb.textContent = ok ? "Excellent!" : failMsg;
          fb.style.color = ok ? "#58cc02" : "#ff4b4b";

          const btnTarget = btn || checkBtn;
          btnTarget.classList.add(ok ? 'correct' : 'wrong');

          if (ok) {
         
            setTimeout(() => {    nice();this.classList.add('fade-out'); if (data.onCorrect) data.onCorrect(); }, 1000);
          } else {
            setTimeout(() => { btnTarget.classList.remove('wrong'); fb.textContent = ""; }, 1800);
          }
        }
      }

      customElements.define('quest-ion', QuestIon);
      window.setQuestion = (d) => document.querySelector('quest-ion')?.loadQuestion(d);
      window.nextQuest = (d) => {
        const el = document.querySelector('quest-ion');
        if (el) { el.classList.remove('fade-out'); el.loadQuestion(d); }
      };
    })();
  </script>
</quest-ion>

  const pGrid   = document.getElementById('profile-grid');

  // --- Picker ---
  CHAR_MAP.forEach(char => {
    const card = document.createElement('div');
    card.className = 'profile-card';
    card.innerHTML = `<img src="${BASE_URL}${char.id}-${char.defaultPose}.png"><span>${char.name}</span>`;
    card.onclick = () => {
      localStorage.setItem('game_char_id', char.id);
      localStorage.setItem('game_char_name', char.name);
      pDialog.close();
      const userName = localStorage.getItem('user_name') || 'there';
      window.Dialogue.open([
        { pose: 'wave', text: `Hi, ${userName}! I'm ${char.name}. I'll be your writing buddy!` },
        { pose: 'point', text: `Each door has levels to complete. Finish all levels to unlock the next door.`, options: [{ label: "LET'S GO!", color: 'green' }] }
      ]);
    };
    pGrid.appendChild(card);
  });

  window.addEventListener('load', () => {
    if (!localStorage.getItem('game_char_id')) pDialog.showModal();
  });

  // --- Dialogue engine ---
  let _queue = [], _idx = 0, _onDone = null;

  window.Dialogue = {
    open(dataArray, onDone) {
      _queue = dataArray;
      _idx = 0;
      _onDone = onDone || null;
      dDialog.showModal();
      this.render();
    },
    render() {
      const step = _queue[_idx];
      const charId = step.charId || localStorage.getItem('game_char_id') || 'a';
      const name   = step.name   || localStorage.getItem('game_char_name') || 'Friend';

      document.getElementById('diag-char').src = `${BASE_URL}${charId}-${step.pose}.png`;
      document.getElementById('diag-name').innerText = name;
      document.getElementById('diag-text').innerText = step.text;

      const bList = document.getElementById('diag-btns');
      bList.innerHTML = '';

      const options = step.options || [{ label: 'CONTINUE', color: 'blue' }];

        const b = document.createElement('button');

        b.style.backgroundColor = theme.bg;

        if (opt.color === 'white') b.style.border = '2px solid #e5e5e5';
        b.onclick = () => {
          if (opt.action) opt.action();
          window.Dialogue.next();
        };
        bList.appendChild(b);
      });
    },
    next() {
      _idx++;
      if (_idx < _queue.length) {
        this.render();
      } else {
        dDialog.close();
        if (_onDone) { _onDone(); _onDone = null; }
      }
    }
  };

  // --- Door intro — called by showLevelList ---

    const userName = localStorage.getItem('user_name') || 'there';

      ];
    }

    window.Dialogue.open(steps, onDone);
  };

})();

const GameEngine = {
  data: null,
  currentDoor: 0,
  currentLevel: 0,
  currentQuestion: 0,
  isTransitioning: false,
  afkTimer: null,

  async init() {
    this.addGameUI();
    await this.fetchData();
    this.renderMap();
    this.updateHomeNav();
    this.startAFKTracker();
  },


  getProgress() {
    const s = localStorage.getItem('allwrite_progress');
    return s ? JSON.parse(s) : { door: 0, level: 0, q: 0 };
  },

  saveProgress(doorIdx, levelIdx, qIdx = 0) {
    const p = this.getProgress();
    if (doorIdx > p.door ||
       (doorIdx === p.door && levelIdx > p.level) ||
       (doorIdx === p.door && levelIdx === p.level && qIdx > p.q)) {
      localStorage.setItem('allwrite_progress', JSON.stringify({ door: doorIdx, level: levelIdx, q: qIdx }));
      this.updateHomeNav();
    }
  },

  play(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator(); const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      if (type === 'correct') {
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
      } else {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(70, ctx.currentTime + 0.2);
        gain.gain.value = 0.3;
      }
      osc.start(); osc.stop(ctx.currentTime + 0.2);
    } catch(e) {}
  },

async fetchData() {
    try {
      const res = await fetch('https://takamuratomokii-debug.github.io/t-js/api/data.js');
      const text = await res.text();
      const json = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
      this.data = JSON.parse(json);
      // No Test level injection — removed
    } catch(e) { console.error("Data Fetch Error:", e); }
  },

loadActiveQuestion(isFirst = false) {
  const level = this.data.doors[this.currentDoor].levels[this.currentLevel];
  const totalQ = level.questions.length;

  // If we reach the end of the regular array, load the hard-coded final
  if (this.currentQuestion === totalQ) {
    return this._loadFinalWritingQuest(level);
  }
  
  // If beyond the final quest, level is complete
  if (this.currentQuestion > totalQ) {
    return this.completeLevel();
  }

  const q = level.questions[this.currentQuestion];
  this._renderQuestion(q, isFirst);
  this.updateProgressUI();
  this.updateNavButtons();
},

_loadFinalWritingQuest(level) {
  // Key format matches HARD_CODED_FINALS: door+1, level+1, then 1-5
  // e.g. door 0, level 0 → keys "111","112","113","114","115"
  const d = this.currentDoor + 1;
  const l = this.currentLevel + 1;
  const prefix = `${d}${l}`;

  // Collect all 5 questions for this door+level
  const finals = [1,2,3,4,5]
    .map(n => HARD_CODED_FINALS[`${prefix}${n}`])
    .filter(Boolean);

  // No finals defined for this level — skip straight to complete
  if (!finals.length) return this.completeLevel();

  const charId = localStorage.getItem('game_char_id') || 'a';

  // Run questions in sequence, complete level after last one
  const runFinal = (idx) => {
    if (idx >= finals.length) {
      this.currentQuestion++;
      this.saveProgress(this.currentDoor, this.currentLevel, this.currentQuestion);
      setTimeout(() => { this.isTransitioning = false; this.completeLevel(); }, 1200);
      return;
    }

    const hardQ = finals[idx];
    const qData = {
      type: hardQ.type || 'choice',
      question: hardQ.question,
      options: hardQ.options || [],
      answer: hardQ.answer,
      contains: hardQ.contains || [],
      hint: hardQ.hint || '',
      onCorrect: () => {
        if (this.isTransitioning) return;
        this.isTransitioning = true;
        this.play('correct');
        setTimeout(() => {
          this.isTransitioning = false;
          runFinal(idx + 1);
        }, 1200);
      }
    };

    if (idx === 0) {
      // Show dialogue before the first final question
      if (window.Dialogue) {
        window.Dialogue.open([{
          charId,
          pose: 'wave',
          text: `Great job! Now let's finish this level with one final quest!`,
          options: [{ label: "LET'S GO!", color: 'gold' }]
        }], () => {
          window.nextQuest(qData);
          this.updateProgressUI();
          this.updateNavButtons();
        });
      } else {
        window.nextQuest(qData);
        this.updateProgressUI();
        this.updateNavButtons();
      }
    } else {
      window.nextQuest(qData);
      this.updateProgressUI();
      this.updateNavButtons();
    }
  };

  runFinal(0);
},
_renderQuestion(q, isFirst) {
  let qType = q.type || 'choice';
  const qTextLower = q.question.toLowerCase();
  const hasChoices = (q.choices || q.options || []).length > 0;
  const isInputTrigger = !hasChoices && INPUT_TRIGGERS.some(t => qTextLower.includes(t));

  if (isInputTrigger || qType === 'input') { qType = 'input'; }
  else if (qType === 'word' || qType === 'choice') { qType = 'choice'; }
  else if (qType === 'order') { qType = 'reorder'; }

  const questionData = {
    type: qType,
    question: q.question,
    options: q.choices || q.options || [],
    answer: q.answer,
    contains: q.contains || [],
    hint: q.hint || '',
    onCorrect: () => {
      if (this.isTransitioning) return;
      this.isTransitioning = true;
      this.play('correct');
      this.currentQuestion++;
      this.saveProgress(this.currentDoor, this.currentLevel, this.currentQuestion);
      setTimeout(() => { this.isTransitioning = false; this.loadActiveQuestion(false); }, 1200);
    }
  };

  if (isFirst) window.setQuestion(questionData);
  else window.nextQuest(questionData);
},
updateNavButtons() {
    const prog = this.getProgress();
    const hasClearedNext = (this.currentDoor < prog.door) ||
                           (this.currentDoor === prog.door && this.currentLevel < prog.level) ||
                           (this.currentDoor === prog.door && this.currentLevel === prog.level && (this.currentQuestion + 1) <= prog.q);
    const prevBtn = document.getElementById('nav-prev');
    const nextBtn = document.getElementById('nav-next');
    if (prevBtn) {
      prevBtn.style.opacity = this.currentQuestion === 0 ? "0.2" : "1";
      prevBtn.onclick = this.currentQuestion === 0 ? null : () => { this.currentQuestion--; this.loadActiveQuestion(false); };
    }
    if (nextBtn) {
      nextBtn.style.opacity = hasClearedNext ? "1" : "0.2";
      nextBtn.onclick = hasClearedNext ? () => { this.currentQuestion++; this.loadActiveQuestion(false); } : null;
    }
  },

  toggleScreen(screen) {
    const screens = { 'map': 'door-co', 'list': 'list-co', 'game': 'quest-ion' };
    Object.keys(screens).forEach(k => {
      const el = document.querySelector(screens[k]);
      if (el) el.style.display = (screen === k) ? 'flex' : 'none';
    });
    const isGame = screen === 'game', isHome = screen === 'map' || screen === 'list';
    if (document.getElementById('home-top-nav')) document.getElementById('home-top-nav').style.display = isHome ? 'flex' : 'none';
    if (document.getElementById('game-top-nav')) document.getElementById('game-top-nav').style.display = isGame ? 'flex' : 'none';
    if (document.getElementById('game-nav-bar')) document.getElementById('game-nav-bar').style.display = isGame ? 'flex' : 'none';
  },

  renderMap() {
    if (!this.data) return;
    this.toggleScreen('map');
    const prog = this.getProgress();
    const configs = this.data.doors.map((d, i) => {
      const isLocked = i > prog.door;
      return {
        title: `UNIT ${d.door}`, locked: isLocked,
        bgColor: isLocked ? '#f5f5f5' : (i % 2 === 0 ? '#fff9e6' : '#e8f7ff'),
        iconColor: isLocked ? DUO_PALETTE.gray.bg : (i % 2 === 0 ? DUO_PALETTE.gold.bg : DUO_PALETTE.blue.bg),
        depthColor: isLocked ? DUO_PALETTE.gray.shadow : (i % 2 === 0 ? DUO_PALETTE.gold.shadow : DUO_PALETTE.blue.shadow),
        faIcon: isLocked ? 'fa-solid fa-lock' : 'fa-solid fa-feather-alt',
        contentLabel: d.name.split(':')[1]?.trim() || "Lesson",
      };
    });
    window.renderSideDoors('door-co', configs);
    setTimeout(() => {
      document.querySelectorAll('.duo-door').forEach((btn, i) => {
        if (i <= prog.door) btn.onclick = () => this.showLevelList(i);
      });
    }, 200);
  },

 showLevelList(doorIdx) {
    this.currentDoor = doorIdx;
    const door = this.data.doors[doorIdx];
    const prog = this.getProgress();
    const seenKey = `allwrite_door_seen_${doorIdx}`;
    const isFirstVisit = !localStorage.getItem(seenKey);
    const fromGame = !!this._fromGame;
    this._fromGame = false; // reset immediately
    const doorLabel = door.name.split(':')[1]?.trim() || door.name;

    const renderList = () => {
      this.toggleScreen('list');
      const levelButtons = door.levels.map((l, i) => {
        const isLocked  = (doorIdx > prog.door) || (doorIdx === prog.door && i > prog.level);
        const isCurrent = (doorIdx === prog.door && i === prog.level);
        const theme = isLocked ? DUO_PALETTE.white : DUO_PALETTE.gold;
        return {
          label: isLocked ? '🔒 Locked' : (isCurrent && prog.q > 0 ? `Lvl ${i+1} (Resume)` : `Lvl ${i+1}: ${l.title}`),
          color: theme.bg, shadow: theme.shadow,
          textColor: isLocked ? DUO_PALETTE.gray.bg : theme.text,
          action: isLocked ? null : () => this.startLesson(i)
        };
      });
      levelButtons.unshift({
        label: '← BACK',
        color: DUO_PALETTE.white.bg, shadow: DUO_PALETTE.white.shadow, textColor: DUO_PALETTE.white.text,
        action: () => this.renderMap()
      });
      window.renderList('list-co', levelButtons);
    };

    // Coming back from inside the game (exit button or level complete) — skip dialogue
    if (fromGame) {
      renderList();
      return;
    }

    // Clicked door from the map
    if (window.triggerDoorIntro) {
      if (isFirstVisit) localStorage.setItem(seenKey, 'true');
      this.toggleScreen('map');
      window.triggerDoorIntro(doorIdx, doorLabel, !isFirstVisit, renderList);
    } else {
      renderList();
    }
  },

  startLesson(levelIdx) {
    this.currentLevel = levelIdx;
    const prog = this.getProgress();
    this.currentQuestion = (this.currentDoor === prog.door && levelIdx === prog.level) ? (prog.q || 0) : 0;
    this.isTransitioning = false;
    this.toggleScreen('game');
    this.loadActiveQuestion(true);
  },

  completeLevel() {
    nice();
    const door = this.data.doors[this.currentDoor];
    let nDoor = this.currentDoor, nLvl = this.currentLevel + 1;
    if (nLvl >= door.levels.length) { nDoor++; nLvl = 0; }
    this.saveProgress(nDoor, nLvl, 0);
    this._fromGame = true; // came from inside the game, skip door dialogue
    if (window.triggerMoti) window.triggerMoti({ title: "Next!", msg: "Level Up!", img: charImg });
    setTimeout(() => { this.isTransitioning = false; this.showLevelList(this.currentDoor); }, 2000);
  },

updateHomeNav() {
  const prog = this.getProgress();
  const statsContainer = document.getElementById('home-stats');
  if (!statsContainer || !this.data) return;

  let totalQ = 0, totalLvl = 0;
  this.data.doors.forEach((door, dIdx) => {
    door.levels.forEach((level, lIdx) => {
      if (dIdx < prog.door || (dIdx === prog.door && lIdx < prog.level)) { 
        totalQ += level.questions.length; 
        totalLvl++; 
      }
      else if (dIdx === prog.door && lIdx === prog.level) { 
        totalQ += prog.q; 
      }
    });
  });

  // Check if user has reached Door 5
  let btnSt = '';

        <span>REWARDS</span>

    `;

    <button style="background:#fff9e6cc; padding:4px 10px; border-radius:8px; border:1px solid ${DUO_PALETTE.gold.bg}; color:${DUO_PALETTE.gold.shadow};">
      <i class="fa-solid fa-check"></i> ${totalLvl}
    </button>
    <span style="color:${DUO_PALETTE.gold.bg}; display:flex; align-items:center; gap:5px;">
      <i class="fa-solid fa-fire"></i> ${totalQ}
    </span>
  `;
},

  updateProgressUI() {
    const level = this.data.doors[this.currentDoor].levels[this.currentLevel];
    const pct = (this.currentQuestion / level.questions.length) * 100;
    const fill = document.getElementById('game-prog-fill');
    if (fill) fill.style.width = pct + "%";
  },

  startAFKTracker() {
    const reset = () => {
      clearTimeout(this.afkTimer);
      this.afkTimer = setTimeout(() => this.showAFKPopup(), 3000 + Math.random() * 7000);
    };
    ['onmousemove','onmousedown','ontouchstart','onclick','onkeypress'].forEach(e => window[e] = reset);
  },

  showAFKPopup() {
    const isHome = document.querySelector('door-co')?.style.display !== 'none';
    if (!isHome) return;
