<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllWrite Rewards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #58cc02;
            --secondary: #1cb0f6;
            --bg: #f7f7f7;
            --text: #4b4b4b;
            --border: #e5e5e5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Stats Card */
        .header-card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 4px 0 var(--border);
        }

        /* The Wheel Area */
        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #4b4b4b;
            position: relative;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #ff4b4b 0deg 72deg, 
                #f7a600 72deg 144deg, 
                #58cc02 144deg 216deg, 
                #1cb0f6 216deg 288deg, 
                #ce82ff 288deg 360deg
            );
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #4b4b4b;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .btn-spin {
            margin-top: 30px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 18px;
            font-weight: bold;
            font-size: 1.4rem;
            box-shadow: 0 6px 0 #46a302;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-spin:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #46a302;
        }

        /* Modal / Pop-up */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: white;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            width: 80%;
            max-width: 320px;
            transform: scale(0.8);
            animation: popIn 0.3s forwards;
        }

        @keyframes popIn { to { transform: scale(1); } }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="header-card">
    <h2 id="name-display">Hi, Champion!</h2>
    <div style="display:flex; justify-content:space-around;">
        <div><small>Doors</small><div id="door-val" style="font-weight:bold; font-size:1.2rem;">0</div></div>
        <div><small>Tasks</small><div style="font-weight:bold; font-size:1.2rem;">125</div></div>
    </div>
</div>

<div class="wheel-container">
    <div class="wheel-pointer"></div>
    <div id="wheel"></div>
</div>

<button class="btn-spin" onclick="spinNow()" id="spin-btn">SPIN!</button>

<div id="modal-overlay">
    <div class="modal">
        <h1 style="color:var(--primary)">AWESOME!</h1>
        <p>You claimed:</p>
        <h2 id="prize-name" style="background:#f0f0f0; padding:10px; border-radius:10px;">Item</h2>
        <button class="btn-spin" onclick="closeModal()" style="font-size:1rem; padding:10px 30px;">CONTINUE</button>
    </div>
</div>

<audio id="spin-sound" src="https://www.soundjay.com/misc/sounds/mechanical-clutter-1.mp3"></audio>
<audio id="win-sound" src="https://www.soundjay.com/human/sounds/applause-01.mp3"></audio>

<script>
    // Validation
    const rawProgress = localStorage.getItem('allwrite_progress');
    const uName = localStorage.getItem('user_name');
    
    if(!rawProgress || !uName) {
        window.location.href = "https://allwrite-sh.vercel.app/allow/new";
    }

    const progress = JSON.parse(rawProgress);
    document.getElementById('name-display').innerText = `Hi, ${uName}!`;
    document.getElementById('door-val').innerText = progress.door;

    let spinning = false;

    function spinNow() {
        if(spinning) return;
        spinning = true;

        const wheel = document.getElementById('wheel');
        const btn = document.getElementById('spin-btn');
        const spinSfx = document.getElementById('spin-sound');
        
        btn.disabled = true;
        spinSfx.play();

        const deg = Math.floor(Math.random() * 360) + 3600; // 10 rotations + random
        wheel.style.transform = `rotate(${deg}deg)`;

        setTimeout(() => {
            showPrize(deg);
        }, 4000);
    }

    function showPrize(deg) {
        const prizes = ["Fudgee Bar", "Pen and Paper", "Nova", "Combi", "Piattos"];
        const actualDeg = deg % 360;
        const index = Math.floor((360 - actualDeg) / 72) % 5;
        const won = prizes[index];

        document.getElementById('prize-name').innerText = won;
        document.getElementById('modal-overlay').style.display = 'flex';
        document.getElementById('win-sound').play();
        
        startConfetti();
    }

    function closeModal() {
        location.reload(); // Reset for next time
    }

    // --- Confetti Engine ---
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function startConfetti() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i=0; i<100; i++) {
            particles.push({
                x: canvas.width/2,
                y: canvas.height/2,
                dir: Math.random() * Math.PI * 2,
                speed: Math.random() * 10 + 5,
                color: `hsl(${Math.random()*360}, 70%, 50%)`,
                r: Math.random() * 6 + 2
            });
        }
        requestAnimationFrame(updateConfetti);
    }

    function updateConfetti() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.x += Math.cos(p.dir) * p.speed;
            p.y += Math.sin(p.dir) * p.speed + 3; // gravity
            p.speed *= 0.98;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            ctx.fill();
        });
        if(particles.length > 0) requestAnimationFrame(updateConfetti);
    }
</script>

</body>
</html>
