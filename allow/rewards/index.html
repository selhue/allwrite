<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AllWrite Rewards</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #58cc02;
            --secondary: #1cb0f6;
            --bg: #f7f7f7;
            --text: #4b4b4b;
            --border: #e5e5e5;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .header-card {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 4px 0 var(--border);
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 20px auto;
        }

        #wheel-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        #wheel-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #4b4b4b;
            background: conic-gradient(
                #ff4b4b 0deg 72deg, 
                #f7a600 72deg 144deg, 
                #58cc02 144deg 216deg, 
                #1cb0f6 216deg 288deg, 
                #ce82ff 288deg 360deg
            );
        }

        .wheel-labels {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-origin: 0% 0%;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            text-align: center;
            width: 110px;
            margin-left: 25px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .wheel-pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #4b4b4b;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 10;
        }

        .btn-spin {
            margin-top: 30px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 18px;
            font-weight: bold;
            font-size: 1.4rem;
            box-shadow: 0 6px 0 #46a302;
            cursor: pointer;
        }

        .btn-spin:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #46a302;
        }

        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: white;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            width: 85%;
            max-width: 340px;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .prize-img-pop {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin: 15px 0;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 99; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="header-card">
    <h2 id="name-display">Hi!</h2>
    <div style="display:flex; justify-content:space-around;">
        <div><small>Doors</small><div id="door-val" style="font-weight:bold; font-size:1.2rem;">0</div></div>
        <div><small>Tasks</small><div style="font-weight:bold; font-size:1.2rem;">125</div></div>
    </div>
</div>

<div class="wheel-container">
    <div class="wheel-pointer"></div>
    <div id="wheel-wrapper">
        <div id="wheel-bg"></div>
        <div class="wheel-labels" id="labels-container"></div>
    </div>
</div>

<button class="btn-spin" onclick="spinNow()" id="spin-btn">SPIN!</button>

<div id="modal-overlay">
    <div class="modal">
        <h1 style="color:var(--primary); margin:0;">YOU WON!</h1>
        <img id="prize-img" src="" class="prize-img-pop">
        <h2 id="prize-name" style="margin:10px 0; color:var(--text);">Item</h2>
        <button class="btn-spin" onclick="closeModal()" style="font-size:1rem; padding:12px 40px; margin-top:10px;">CLAIM NOW</button>
    </div>
</div>

<audio id="spin-sound" src="https://www.soundjay.com/misc/sounds/mechanical-clutter-1.mp3"></audio>
<audio id="win-sound" src="https://www.soundjay.com/human/sounds/applause-01.mp3"></audio>

<script>
    const prizeData = [
        { name: "Fudgee Bar", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQlRPxvDJXWMR4tRoW5Ph1sG7l7t0NobFiYwNu6fxksJfRiwH9y" },
        { name: "Pen & Paper", img: "https://img.freepik.com/free-photo/notebook-blue-wood-table_1249-633.jpg?w=740&q=80" },
        { name: "Nova", img: "https://shopsuki.ph/cdn/shop/files/4800016663802_1024x.jpg?v=1756178180" },
        { name: "Combi", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRA9A4FHRPEqbZg1aFQpPMzYF8x_aOLMlSb7g&s" },
        { name: "Piattos", img: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSmfT9K1LB6vOLdgVkrQYGy0rwoPKZa2q-tuA&s" }
    ];

    const labelsContainer = document.getElementById('labels-container');
    prizeData.forEach((item, i) => {
        const angle = (i * 72) + 36;
        const el = document.createElement('div');
        el.className = 'label';
        el.style.transform = `rotate(${angle}deg) translate(15px, -50%)`;
        el.innerText = item.name;
        labelsContainer.appendChild(el);
    });

    const rawProgress = localStorage.getItem('allwrite_progress');
    const uName = localStorage.getItem('user_name');
    if(!rawProgress || !uName) window.location.href = "";

    const progress = JSON.parse(rawProgress);
    document.getElementById('name-display').innerText = `Hi, ${uName}!`;
    document.getElementById('door-val').innerText = progress.door;

    let spinning = false;

    function spinNow() {
        if(spinning) return;
        spinning = true;

        const wheel = document.getElementById('wheel-wrapper');
        const btn = document.getElementById('spin-btn');
        const spinSfx = document.getElementById('spin-sound');
        
        btn.disabled = true;
        spinSfx.play();

        const randomSpin = Math.floor(Math.random() * 360);
        const totalDeg = 3600 + randomSpin;
        wheel.style.transform = `rotate(${totalDeg}deg)`;

        setTimeout(() => {
            const actualDeg = totalDeg % 360;
            const index = Math.floor((360 - actualDeg) / 72) % 5;
            const win = prizeData[index];

            document.getElementById('prize-name').innerText = win.name;
            document.getElementById('prize-img').src = win.img;
            document.getElementById('modal-overlay').style.display = 'flex';
            document.getElementById('win-sound').play();
            startConfetti();
        }, 4000);
    }

    function closeModal() { location.reload(); }

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function startConfetti() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        for(let i=0; i<80; i++) {
            particles.push({
                x: canvas.width/2, y: canvas.height/2,
                dir: Math.random() * Math.PI * 2,
                speed: Math.random() * 8 + 4,
                color: `hsl(${Math.random()*360}, 80%, 60%)`,
                r: Math.random() * 5 + 2
            });
        }
        requestAnimationFrame(updateConfetti);
    }

    function updateConfetti() {
        ctx.clearRect(0,0, canvas.width, canvas.height);
        particles.forEach((p) => {
            p.x += Math.cos(p.dir) * p.speed;
            p.y += Math.sin(p.dir) * p.speed + 2;
            p.speed *= 0.99;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
        });
        if(particles.length > 0) requestAnimationFrame(updateConfetti);
    }
</script>

</body>
</html>
