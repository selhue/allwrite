    <style>
    :root { 
        --bg-light: #FFFFFF;

        --border: #E5E5E5;
        --white: #FFFFFF;

    body {

    #splash, .overlay-screen {

    .logo-box { 
        background: var(--accent); 
        width: 80px; 
        height: 80px; 
        border-radius: 20px; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        animation: bounce 2s infinite ease-in-out; 
    }

    /* ── screens ── */
    .screen { 
        position: fixed; 
        inset: 0; 
        display: flex; 
        flex-direction: column; 
        z-index: 50; 
        overflow-y: auto; 
        padding-bottom: 120px; 
        animation: fadeIn 0.4s ease-out;
    }

    .screen header { 
        position: sticky; 
        top: 0; 
         z-index: 10;

    /* ── map ── */
    .map-container { 
        align-content: center;
        place-content: center;
        justify-content: center;
        
        height: 70dvh;
        max-height: 70dvh;
  
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        padding: 40px 0; 
        gap: 20px; 
    }

    .level-node { 
        width: 70px; 
        height: 70px; 
        background: var(--border); 
        border-radius: 50%; 
        display: flex; 
        justify-content: center; 
        align-items: center; 
        font-size: 1.3rem; 
        border: #ffda60 2px solid;
        font-weight: 900; 
        box-shadow: 0 6px 0 #AFB4B9; 
        transition: all 0.1s;
        cursor: pointer; 
        color: var(--text-muted);

    .level-node:active:not(.locked) {

        box-shadow: 0 2px 0 #AFB4B9;
    }

        box-shadow: 0 4px 0 var(--accent-shadow); }

    .level-node.active:active { 
        
        box-shadow: 0 3px 0 var(--accent-shadow); }

    /* ── buttons & keys (Universal Click Fix) ── */

        background-color: var(--accent); 
        color: var(--text-main); 
        min-height: 52px;

        text-transform: uppercase;

        cursor: pointer; 
        display: inline-flex; 
        align-items: center; 
        justify-content: center; 
        transition: filter 0.2s, transform 0.1s ease-out, border-bottom 0.1s ease-out;

        box-sizing: border-box;
    }

 .footer-btn:hover:not(:disabled), .start-btn:hover, .key-btn:hover {

}

  }

<pick id="dp" class="duo-door-picker">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .duo-door-picker {
            --card-light: #ffffff;
            --text-main: #4b4b4b;
            --text-sub: #777777;
            --duo-blue: #1cb0f6;
            --duo-gold: #ffc800;
            
            min-height: 70dvh;
            padding: 30px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            border-radius: 28px;
            user-select: none;
            box-sizing: border-box;
            width: 100%;
        }

        .duo-door-picker h1 {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 800;
            margin: 0 0 5px 0;
        }

        .subtitle {
            color: var(--text-sub);
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .nav-btn {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            background: var(--card-dark);
            border: 2px solid var(--bg-dark);
            border-bottom: 4px solid var(--bg-dark);
            color: var(--white);
            cursor: pointer;
            transition: all 0.1s;
        }

     

        .nav-btn:active {
            transform: translateY(2px);
            border-bottom-width: 2px;
        }

        .carousel-wrapper {
            width: 100%;
            display: flex;
            gap: 20px;
            padding: 20px 0;
            overflow-x: auto;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
            justify-content: center; 
        }

        @media (max-width: 660px) {
            .carousel-wrapper {
                justify-content: flex-start;
                padding-left: 40px;
                padding-right: 40px;
                scroll-snap-type: x mandatory;
            }
            .door-card {
                scroll-snap-align: center;
            }
        }

        .carousel-wrapper::-webkit-scrollbar {
            display: none;
        }

        .door-card {
            flex: 0 0 140px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .door {
            width: 125px;
            height: 150px;
            background: var(--card-dark);
            border: 3px solid var(--bg-dark);
            border-bottom: 8px solid var(--bg-dark);
            border-radius: 20px 20px 8px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.15s ease;
            color: #afafaf;
        }

        .door i {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .level-badge {
            position: absolute;
            top: -12px;
            background: var(--duo-gold);
            color: #ffffff; /* White text on gold looks cleaner in light mode */
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: 900;
            font-size: 11px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }

        .door-card:hover .door {
            transform: translateY(-5px);
            border-color: var(--duo-blue);
            color: var(--duo-blue);
        }

        .door-card:active .door {
            transform: translateY(2px);
            border-bottom-width: 3px;
        }

        .name-tag {
            margin-top: 12px;
            font-weight: 800;
            font-family: 'Nunito',Arial, Helvetica, sans-serif;

        });

        let state = { levelIdx: 0, stars: 0, currentInput: "", activeTab: 'levels' };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

 

function getProgress(doorKey) {
  return Number(localStorage.getItem('progress_' + doorKey)) || 0
}

function saveProgress(doorKey, levelId) {
  localStorage.setItem('progress_' + doorKey, levelId)
}

function renderMap(doorKey) {
  const map = document.getElementById('levelMap')
  map.innerHTML = ""

  if (doorKey === 'door1') localStorage.setItem('currentLevel', 'door1')
  if (doorKey === 'door2') localStorage.setItem('currentLevel', 'door2')
  if (doorKey === 'door3') localStorage.setItem('currentLevel', 'door3')
  if (doorKey === 'door4') localStorage.setItem('currentLevel', 'door4')
  if (doorKey === 'door5') localStorage.setItem('currentLevel', 'door5')

  const lesson = LESSONS.find(l => l.key === doorKey)
  if (!lesson) return

  const savedLevel = getProgress(doorKey) || lesson.levels[0].id
  state.levelIdx = savedLevel

  lesson.levels.slice().forEach(level => {
    const node = document.createElement('div')

    // remove first digit
    const displayId = String(level.id).slice(1)

    const done = level.id < savedLevel

    node.id = level.id
    node.className = 'level-node active ' + (done ? ' done' : '')
    node.innerHTML = done ? '✓' : displayId

    node.onmousedown = () => {
         state.levelIdx = level.id;
      showLessonIntro(level.id)
      loadLevel(level.id)
    }

    map.appendChild(node)
  })
}
function showLessonIntro(idx) {
  let lvl = null

  for (const door of LESSONS) {
    lvl = door.levels.find(l => l.id === idx)
    if (lvl) break
  }

  if (!lvl) return

  document.getElementById('introTag').innerText = lvl.id
  document.getElementById('introTitle').innerText = lvl.title
  document.getElementById('introDesc').innerText = lvl.details

  document.getElementById('homeScreen').classList.add('hidden')
  document.getElementById('tabNav').classList.add('hidden')
  document.getElementById('lessonIntro').classList.remove('hidden')
}

function prepareNextLevel() { showLessonIntro(state.levelIdx); }

function startGame() {
    document.getElementById('lessonIntro').classList.add('hidden');
    document.getElementById('homeScreen').classList.add('hidden');
    document.getElementById('gameUI').classList.remove('hidden');
    loadLevel(state.levelIdx);

}

function loadLevel(levelId) {
  let lvl = null

  for (const door of LESSONS) {
    lvl = door.levels.find(l => l.id === levelId)
    if (lvl) break
  }

  if (!lvl) return

  const container = document.getElementById('gameContainer')

  state.currentInput = ""
  document.getElementById('progressBar').style.width = `${(levelId / 50) * 100}%`
  document.getElementById('stars').innerText = state.stars

  let html = `<div class="text-center mt-2 mb-4">
      <h2 class="text-2xl font-black">${lvl.word}</h2>
      <p style="background:#fafafa; padding:0.1in; border-radius:15px;"
      class="text-slate-500 font-bold text-xs uppercase tracking-widest mt-1">Hint: ${lvl.hint}</p>
  </div>`

  if (lvl.type === 'pixel') {
    html += `<div class="pixel-grid" style="--pixel-color:${lvl.color}">`
    for (let i = 0; i < 16; i++)
      html += `<div class="pixel-cube ${LETTER_ART[lvl.artTarget]?.includes(i) ? 'active' : ''}"></div>`
    html += `</div>`
    html += `<div class="input-display" id="disp">${'_'.repeat(lvl.answer.length)}</div>`
    html += renderKeyboard(lvl)

  } else if (lvl.type === 'letter') {
    html += `<div class="input-display" id="disp">${'_'.repeat(lvl.answer.length)}</div>`
    html += renderKeyboard(lvl)

  } else if (lvl.type === 'scramble' || lvl.type === 'typing') {
    html += `<div class="input-display" id="disp">_</div>`
    html += renderKeyboard(lvl)

  } else if (lvl.type === 'word') {
    const blanks = lvl.answer.split(' ').map(() => '___').join(' ')
    html += `<div class="input-display" id="disp" style="font-size:1rem;letter-spacing:2px">${blanks}</div>`
    html += renderWordChoices(lvl)

  } else if (lvl.type === 'write') {
    html += `<textarea id="writeInput" placeholder="Write your answer here..."
        style="width:100%;min-height:90px;background:#1e293b;color:#fff;border-radius:12px;
        padding:12px;font-size:0.95rem;resize:none;margin-top:8px;border:none;outline:none;
        font-family:Nunito,sans-serif"
        oninput="state.currentInput=this.value;document.getElementById('mainBtn').disabled=!this.value.trim()">
    </textarea>`
  }

  container.innerHTML = html
}
// ── WORD CHOICES ──────────────────────────────────────────────
function renderWordChoices(lvl) {
    const choices = [...lvl.choices].sort(() => Math.random() - 0.5);
    return `<div style="display:flex;flex-direction:column;gap:10px;margin-top:12px">
        ${choices.map((c, i) => `
            <div class="key-btn"
                style="padding:14px 16px;border-radius:14px;font-size:0.88rem;font-weight:700;
                text-align:left;cursor:pointer;width:100%;display:block"
                id="wc-${i}"
                data-val="${c.replace(/"/g,'&quot;')}"
                onmousedown="pickChoice(this)">
                ${c}
            </div>`).join('')}
    </div>`;
}

function pickChoice(el) {
    const val = el.getAttribute('data-val');
    const lvl = getLevelById(state.levelIdx);
    const correct = val === lvl.answer;

    const disp = document.getElementById('disp');
    if (disp) disp.innerText = val;

    document.querySelectorAll('[id^="wc-"]').forEach(btn => {
        btn.style.pointerEvents = 'none';
        if (btn.getAttribute('data-val') === lvl.answer) {
            btn.style.background = '#4ade8033';
            btn.style.color = '#4ade80';
            btn.style.borderColor = '#4ade80';
        }
    });
    if (!correct) {
        el.style.background = '#ef444433';
        el.style.color = '#ef4444';
        el.style.borderColor = '#ef4444';
    }

    playBeep(correct ? 800 : 100);
    setTimeout(() => {
        if (correct) {
            state.stars += 10;
            advanceLevel();
        } else {
            loadLevel(state.levelIdx); // retry same level
        }
    }, 700);
}

function handleAction() {
    const lvl = getLevelById(state.levelIdx);
    if (!lvl || lvl.type === 'word') return;

    const correct = lvl.type === 'write'
        ? state.currentInput.trim().length > 5
        : state.currentInput === lvl.answer;

    if (correct) {
        state.stars += 10;
        playBeep(800);
        advanceLevel();
    } else {
        const btn = document.getElementById('mainBtn');
        btn.classList.add('shake', 'wrong');
        btn.innerText = "Again";
        playBeep(100);
        setTimeout(() => {
            btn.classList.remove('shake', 'wrong');
            btn.innerText = "Next";
            loadLevel(state.levelIdx); // retry same level
        }, 400);
    }
}

function advanceLevel() {
    const doorKey = localStorage.getItem('currentLevel');
    const lesson = LESSONS.find(l => l.key === doorKey);
    if (!lesson) return showHome();

    const allIds = lesson.levels.map(l => l.id);
    const currIdx = allIds.indexOf(state.levelIdx);
    const nextId = allIds[currIdx + 1];

    saveProgress(doorKey, state.levelIdx);

    if (nextId !== undefined) {
        state.levelIdx = nextId;
        const nextLvl = getLevelById(nextId);
        nextLvl.isFirstOfLesson ? showLessonIntro(nextId) : loadLevel(nextId);
    } else {
        showHome(); // door complete
    }
}


// ── KEYBOARD ─────────────────────────────────────────────────
function renderKeyboard(lvl) {
    const ans = lvl.answer.toUpperCase();
    let keys = [...new Set(ans.split(''))];
    const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fill = Math.ceil(keys.length * 1.5);
    let added = 0;
    while (added < fill) {
        let r = alpha[Math.floor(Math.random() * alpha.length)];
        if (!keys.includes(r)) { keys.push(r); added++; }
    }
    keys.sort(() => Math.random() - 0.5);
    let kb = `<div class="keyboard-grid">`;
    keys.forEach(k => kb += `<div onmousedown="pressKey('${k}')" class="key-btn">${k}</div>`);
    kb += `<div onmousedown="pressKey('DEL')" class="key-btn action">Del</div>`;
    kb += `<div onmousedown="pressKey('CLR')" class="key-btn action">Clr</div>`;
    return kb + `</div>`;
}

function getLevelById(id) {
  for (const door of LESSONS) {
    const found = door.levels.find(l => l.id === id);
    if (found) return found;
  }
  return null;
}

function pressKey(k) {
    playBeep(400);
    
const lvl = getLevelById(state.levelIdx);
    if (k === 'DEL') state.currentInput = state.currentInput.slice(0, -1);
    else if (k === 'CLR') state.currentInput = "";
    else {
        if (lvl.type === 'pixel' || lvl.type === 'letter') {
            if (state.currentInput.length < lvl.answer.length) state.currentInput += k;
        } else {
            state.currentInput += k;
        }
    }
    const disp = document.getElementById('disp');
    disp.innerText = lvl.type === 'letter'
        ? state.currentInput.padEnd(lvl.answer.length, '_')
        : (state.currentInput || '_');
    document.getElementById('mainBtn').disabled = state.currentInput.length === 0;
}

            ['tab-levels','tab-quest','tab-booklet'].forEach(id => document.getElementById(id).classList.remove('active'));

            if (tab === 'levels') {
                document.getElementById('homeScreen').classList.remove('hidden');
                document.getElementById('tab-levels').classList.add('active');
               renderMap(localStorage.getItem('currentLevel'));
            } else if (tab === 'quest') {
                document.getElementById('questScreen').classList.remove('hidden');
                document.getElementById('tab-quest').classList.add('active');
                renderQuests();
            } else if (tab === 'booklet') {
                document.getElementById('bookletScreen').classList.remove('hidden');
                document.getElementById('tab-booklet').classList.add('active');
                renderBooklet();
            }
        }

        function showHome() {
            document.getElementById('gameUI').classList.add('hidden');
            document.getElementById('lessonIntro').classList.add('hidden');
            document.getElementById('tabNav').classList.remove('hidden');
            switchTab('levels');
        }



        // ── quests ────────────────────────────────────────────────────
        const QUESTS = [
            { icon:'fa-star',          color:'#eab308', bg:'#422006', label:'First Step',      desc:'Complete your first level',         target: 1,  key:'levelsComplete' },
            { icon:'fa-fire',          color:'#f97316', bg:'#431407', label:'On a Roll',        desc:'Complete 10 levels',                target: 10, key:'levelsComplete' },
            { icon:'fa-trophy',        color:'#a78bfa', bg:'#2e1065', label:'Half Way',         desc:'Complete 40 levels',                target: 40, key:'levelsComplete' },
            { icon:'fa-crown',         color:'#fbbf24', bg:'#451a03', label:'Champion',         desc:'Complete all 80 levels',            target: 80, key:'levelsComplete' },
            { icon:'fa-bolt',          color:'#38bdf8', bg:'#0c4a6e', label:'Star Collector',   desc:'Earn 100 stars',                    target: 100, key:'stars' },
            { icon:'fa-medal',         color:'#4ade80', bg:'#052e16', label:'Star Master',      desc:'Earn 500 stars',                    target: 500, key:'stars' },
        ];

        function renderQuests() {
            const list = document.getElementById('questList');
            document.getElementById('questStars').innerText = state.stars;
            const levelsComplete = state.levelIdx;
            list.innerHTML = QUESTS.map(q => {
                const val = q.key === 'stars' ? state.stars : levelsComplete;
                const pct = Math.min(100, Math.round((val / q.target) * 100));
                const done = pct >= 100;
                return `<div class="quest-card">
                    <div class="quest-icon" style="background:${q.bg};color:${q.color}"><i class="fa-solid ${q.icon}"></i></div>
                    <div style="flex:1">
                        <div style="display:flex;justify-content:space-between;align-items:center">
                            <span style="font-weight:900;font-size:0.95rem">${q.label}</span>
                            <span style="font-size:0.7rem;font-weight:900;color:${done ? '#4ade80' : '#64748b'}">${done ? '✓ Done' : val+'/'+q.target}</span>
                        </div>
                        <div style="font-size:0.72rem;color:#64748b;margin-top:1px">${q.desc}</div>
                        <div class="quest-bar-bg"><div class="quest-bar-fill" style="width:${pct}%"></div></div>
                    </div>
                </div>`;
            }).join('');
        }

        // ── booklet ───────────────────────────────────────────────────
        const TYPE_COLORS = { pixel:'#a78bfa', typing:'#38bdf8', letter:'#4ade80', scramble:'#fb923c' };

        function renderBooklet() {
            const list = document.getElementById('bookletList');
            // only show levels the player has already seen (completed)
            const seen = DATA.slice(0, Math.max(1, state.levelIdx));
            document.getElementById('bookletCount').innerText = seen.length + ' words';
            list.innerHTML = seen.map(lvl => `
                <div class="booklet-card">
                    <div>
                        <div class="booklet-tag">${lvl.lessonId} · ${lvl.lessonTitle}</div>
                        <div class="booklet-word">${lvl.word} → <span style="color:var(--accent)">${lvl.answer}</span></div>
                        <div class="booklet-hint">${lvl.hint}</div>
                    </div>
                    <span class="booklet-type" style="background:${TYPE_COLORS[lvl.type]}22;color:${TYPE_COLORS[lvl.type]}">${lvl.type}</span>
                </div>`).join('');
        }


        function playBeep(f) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.1);
        }
    </script>

</app>
