<style>
    /* Works in Chrome, Edge, Safari */
::-webkit-scrollbar {
  width: 10px;
}

::-webkit-scrollbar-track {
  background: #0f172a; /* dark navy */
}

::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #3b82f6, #1d4ed8); /* blue gradient */
  border-radius: 8px;
  border: 2px solid #0f172a; /* creates padding effect */

::-webkit-scrollbar-thumb:hover {
  background: linear-gradient(180deg, #60a5fa, #2563eb);

/* Firefox */

<body class="flex flex-col">

<app>
    <!-- CDN preloads -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap">
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --bg-dark: #0f172a; --card-dark: #1e293b; --accent: #eab308; --accent-shadow: #a16207; --error: #ef4444; --text-main: #f8fafc; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Nunito', sans-serif; user-select: none; margin: 0; overflow: hidden; height: 100dvh; }

        /* ── overlays ── */
        #splash, .overlay-screen { position: fixed; inset: 0; background-color: var(--bg-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; transition: all 0.5s ease; text-align: center; padding: 20px; }
        .logo-box { background: var(--accent); width: 80px; height: 80px; border-radius: 20px; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 0 #6f631e; animation: bounce 2s infinite; }

        /* ── screens ── */
        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; z-index: 50; overflow-y: auto; padding-bottom: 90px; }
        .screen header { position: sticky; top: 0; background: var(--bg-dark); z-index: 10; }

        /* ── map ── */
        .map-container { display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 15px; }
        .level-node { width: 65px; height: 65px; background: #334155; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; font-weight: 900; box-shadow: 0 6px 0 #020617; transition: 0.2s; cursor: pointer; }
        .level-node.active { background: var(--accent); box-shadow: 0 6px 0 #655816; color: white; transform: scale(1.1); }
        .level-node.locked { display: none; }

        /* ── progress ── */
        .progress-container { background-color: #334155; height: 10px; border-radius: 99px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #d9de4a, #c5b222); height: 100%; width: 0%; transition: width 0.5s ease; }

        /* ── pixel grid ── */
        .pixel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; background: #020617; padding: 12px; border-radius: 12px; width: fit-content; margin: 0 auto 10px; border: 2px solid #1e293b; }
        .pixel-cube { width: 28px; height: 28px; background: #1e293b; border-radius: 6px; transition: 0.3s; }
        .pixel-cube.active { background: var(--pixel-color, #eab308); }

        /* ── keyboard ── */
        .keyboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 360px; margin-top: auto; padding-bottom: 5px; }
        .key-btn { background-color: var(--card-dark); border-radius: 12px; height: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #020617; cursor: pointer; font-weight: 900; color: white; transition: 0.1s; font-size: 1.1rem; }
        .key-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #020617; }
        .key-btn.action { background-color: #475569; font-size: 0.75rem; text-transform: uppercase; }

        /* ── input display ── */
        .input-display { background: #020617; padding: 10px; border-radius: 15px; width: 100%; text-align: center; font-size: 1.6rem; font-weight: 900; min-height: 55px; color: var(--accent); border: 2px solid #1e293b; margin-bottom: 10px; display: flex; justify-content: center; align-items: center; letter-spacing: 3px; }

        /* ── dock (game UI only) ── */
        .dock { background: rgba(30,41,59,0.9); backdrop-filter: blur(10px); border-radius: 25px; padding: 10px; display: flex; gap: 10px; position: fixed; bottom: 80px; left: 15px; right: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 100; max-width: calc(448px); margin: 0 auto; }
        .footer-btn, .start-btn { background-color: var(--accent); color: white; height: 50px; border-radius: 15px; box-shadow: 0 4px 0 #656516; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .footer-btn:disabled { background: #334155; box-shadow: 0 4px 0 #1e293b; color: #64748b; }
        .footer-btn { flex-grow: 1; }
        .start-btn { width: 200px; margin-top: 20px; }

        /* ── bottom tab nav ── */
       #tabNav { position: fixed; bottom: 0px; left: 0px; right: 0px;  max-width: 448px; margin:auto; height: 65px; background: rgba(15,23,42,0.97); backdrop-filter: blur(12px); border-top: 1px solid #1e293b;
           display: flex; justify-content: space-around; align-items: center; z-index: 150; }
        .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; cursor: pointer; color: #475569; transition: 0.2s; padding: 6px 0; background: none; border: none; }
        .tab-btn i { font-size: 1.2rem; }
        .tab-btn span { font-size: 0.6rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; font-family: 'Nunito', sans-serif; }
        .tab-btn.active { color: var(--accent); }

        /* ── quest screen ── */
        .quest-card { background: var(--card-dark); border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 14px; margin: 0 16px 12px; }
        .quest-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; flex-shrink: 0; }
        .quest-bar-bg { background: #0f172a; border-radius: 99px; height: 8px; overflow: hidden; margin-top: 6px; }
        .quest-bar-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, #d9de4a, #c5b222); transition: width 0.5s; }

        /* ── booklet screen ── */
        .booklet-card { background: var(--card-dark); border-radius: 16px; padding: 14px 16px; margin: 0 16px 10px; display: flex; justify-content: space-between; align-items: center; }
        .booklet-tag { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 2px; }
        .booklet-word { font-size: 1.1rem; font-weight: 900; color: var(--text-main); }
        .booklet-hint { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
        .booklet-type { font-size: 0.7rem; font-weight: 900; padding: 4px 10px; border-radius: 99px; text-transform: uppercase; }

        /* ── utils ── */
        .hidden { display: none !important; }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    </style>

    <!-- splash -->
    <div id="splash">
        <div class="logo-box mb-6"><i class="fa-solid fa-bolt text-4xl text-white"></i></div>
        <h1 class="text-3xl font-black mb-6">AllWrite</h1>
    </div>

    <!-- lesson intro overlay -->
    <div id="lessonIntro" class="overlay-screen hidden">
        <h3 id="introTag" class="text-yellow-400 font-black mb-2 uppercase tracking-widest text-sm"></h3>
        <h2 id="introTitle" class="text-3xl font-black mb-4"></h2>
        <p id="introDesc" class="text-slate-400 mb-4 max-w-xs text-sm"></p>
        <button onmousedown="startGame()" class="start-btn">Start Lesson</button>
    </div>

    <!-- ── TAB: LEVELS (home) ── -->
    <div id="homeScreen" class="screen hidden">
        <header class="p-6 flex justify-between items-center w-full max-w-md mx-auto">
            <h2 class="text-xl font-black uppercase tracking-widest">Levels</h2>
            <div class="font-black text-yellow-400 bg-slate-800 px-4 py-1 rounded-full">⭐ <span id="homeStars">0</span></div>
        </header>
        <div class="map-container" id="levelMap"></div>
        <!-- continue button sits above tab nav -->
        <div style="position:fixed;bottom:75px;left:15px;right:15px;z-index:99;max-width:448px;margin:0 auto;">
            <button onmousedown="prepareNextLevel()" class="footer-btn w-full" style="height:50px;border-radius:15px;box-shadow:0 4px 0 #656516;">Continue Journey</button>
        </div>
    </div>

    <!-- ── TAB: QUEST ── -->
    <div id="questScreen" class="screen hidden">
        <header class="p-6 flex justify-between items-center w-full max-w-md mx-auto">
            <h2 class="text-xl font-black uppercase tracking-widest">Quests</h2>
            <div class="font-black text-yellow-400 bg-slate-800 px-4 py-1 rounded-full">⭐ <span id="questStars">0</span></div>
        </header>
        <div id="questList" class="w-full max-w-md mx-auto pb-4"></div>
    </div>

    <!-- ── TAB: BOOKLET ── -->
    <div id="bookletScreen" class="screen hidden">
        <header class="p-6 flex justify-between items-center w-full max-w-md mx-auto">
            <h2 class="text-xl font-black uppercase tracking-widest">Booklet</h2>
            <span class="text-slate-500 text-sm font-bold" id="bookletCount"></span>
        </header>
        <div id="bookletList" class="w-full max-w-md mx-auto pb-4"></div>
    </div>

    <!-- ── GAME UI ── -->
    <div id="gameUI" class="hidden" style="position:fixed;inset:0;display:flex;flex-direction:column;z-index:60;">
        <header class="p-4 max-w-md mx-auto w-full flex items-center gap-4">
            <div class="h-[8px] flex-grow progress-container"><div id="progressBar" class="progress-fill"></div></div>
            <div class="font-black text-yellow-400 text-sm">⭐ <span id="stars">0</span></div>
        </header>
        <main id="gameContainer" class="flex-grow flex flex-col items-center px-6 pb-40 w-full max-w-md mx-auto overflow-y-auto"></main>
        <div class="dock">
            <button onmousedown="exitGame()" class="bg-slate-700 text-white px-5 rounded-xl border-none h-[50px]"><i class="fa-solid fa-house"></i></button>
            <button id="mainBtn" disabled onmousedown="handleAction()" class="footer-btn">Submit</button>
        </div>
    </div>

    <!-- ── BOTTOM TAB NAV ── -->
    <div id="tabNav" class="hidden">
        <button class="tab-btn active" id="tab-levels" onmousedown="switchTab('levels')">
            <i class="fa-solid fa-map"></i>
            <span>Levels</span>
        </button>
        <button class="tab-btn" id="tab-quest" onmousedown="switchTab('quest')">
            <i class="fa-solid fa-scroll"></i>
            <span>Quest</span>
        </button>
        <button class="tab-btn" id="tab-booklet" onmousedown="switchTab('booklet')">
            <i class="fa-solid fa-book-open"></i>
            <span>Booklet</span>
        </button>
    </div>

    <script>

            window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
        }

        // ── LETTER ART ───────────────────────────────────────────────

              levels:[
                { type:'pixel',   word:'Guess the pixel', artTarget:'A', answer:'A',      color:'#f97316', hint:'First letter of Assignment' },
                { type:'typing',  word:'Pagsusulit',       answer:'EXAM',                  hint:'Sinusulit ng mga estudyante' },
                { type:'letter',  word:'Guess letters',    answer:'THESIS',                hint:'Pananaliksik sa kolehiyo' },
                { type:'scramble',word:'Unscramble',       answer:'RESEARCH',              hint:'Pag-aaral nang malalim' }
              ]},
            { id:"L20", title:"Filipino Values",        desc:"English words for Filipino core values.",
              levels:[
                { type:'pixel',   word:'Guess the pixel', artTarget:'T', answer:'T',      color:'#f43f5e', hint:'First letter of Togetherness' },
                { type:'typing',  word:'Bayanihan',        answer:'UNITY',                 hint:'Lahat nagtutulungan' },
                { type:'letter',  word:'Guess letters',    answer:'RESPECT',               hint:'Respeto in English' },
                { type:'scramble',word:'Unscramble',       answer:'GRATITUDE',             hint:'Pasasalamat in English' }
              ]}
        ];

        // ── flat data ─────────────────────────────────────────────────
        const DATA = [];
        LESSONS.forEach(lesson => {
            lesson.levels.forEach((lvl, i) => {
                DATA.push({ ...lvl, lessonId: lesson.id, lessonTitle: lesson.title, lessonDesc: lesson.desc, isFirstOfLesson: i === 0 });
            });
        });

        let state = { levelIdx: 0, stars: 0, currentInput: "", activeTab: 'levels' };
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('splash').classList.add('hidden');
                document.getElementById('tabNav').classList.remove('hidden');
                switchTab('levels');
            }, 800);
        };

        // ── tab nav ───────────────────────────────────────────────────
        function switchTab(tab) {
            state.activeTab = tab;
            ['homeScreen','questScreen','bookletScreen'].forEach(id => document.getElementById(id).classList.add('hidden'));
            ['tab-levels','tab-quest','tab-booklet'].forEach(id => document.getElementById(id).classList.remove('active'));

            if (tab === 'levels') {
                document.getElementById('homeScreen').classList.remove('hidden');
                document.getElementById('tab-levels').classList.add('active');
                renderMap();
            } else if (tab === 'quest') {
                document.getElementById('questScreen').classList.remove('hidden');
                document.getElementById('tab-quest').classList.add('active');
                renderQuests();
            } else if (tab === 'booklet') {
                document.getElementById('bookletScreen').classList.remove('hidden');
                document.getElementById('tab-booklet').classList.add('active');
                renderBooklet();
            }
        }

        // ── levels / map ──────────────────────────────────────────────
        function renderMap() {
            const map = document.getElementById('levelMap');
            map.innerHTML = "";
            for (let i = DATA.length - 1; i >= 0; i--) {
                const node = document.createElement('div');
                const unlocked = i <= state.levelIdx;
                const done = i < state.levelIdx;
                node.className = `level-node ${unlocked ? 'active' : 'locked'}`;
                node.innerHTML = done ? '✓' : (i + 1);
                if (unlocked) node.onmousedown = () => { state.levelIdx = i; showLessonIntro(i); };
                map.appendChild(node);
            }
            document.getElementById('homeStars').innerText = state.stars;
            scrollToBottom();
        }

        function showHome() {
            document.getElementById('gameUI').classList.add('hidden');
            document.getElementById('lessonIntro').classList.add('hidden');
            document.getElementById('tabNav').classList.remove('hidden');
            switchTab('levels');
        }

        function exitGame() { showHome(); }

        // ── quests ────────────────────────────────────────────────────
        const QUESTS = [
            { icon:'fa-star',          color:'#eab308', bg:'#422006', label:'First Step',      desc:'Complete your first level',         target: 1,  key:'levelsComplete' },
            { icon:'fa-fire',          color:'#f97316', bg:'#431407', label:'On a Roll',        desc:'Complete 10 levels',                target: 10, key:'levelsComplete' },
            { icon:'fa-trophy',        color:'#a78bfa', bg:'#2e1065', label:'Half Way',         desc:'Complete 40 levels',                target: 40, key:'levelsComplete' },
            { icon:'fa-crown',         color:'#fbbf24', bg:'#451a03', label:'Champion',         desc:'Complete all 80 levels',            target: 80, key:'levelsComplete' },
            { icon:'fa-bolt',          color:'#38bdf8', bg:'#0c4a6e', label:'Star Collector',   desc:'Earn 100 stars',                    target: 100, key:'stars' },
            { icon:'fa-medal',         color:'#4ade80', bg:'#052e16', label:'Star Master',      desc:'Earn 500 stars',                    target: 500, key:'stars' },
        ];

        function renderQuests() {
            const list = document.getElementById('questList');
            document.getElementById('questStars').innerText = state.stars;
            const levelsComplete = state.levelIdx;
            list.innerHTML = QUESTS.map(q => {
                const val = q.key === 'stars' ? state.stars : levelsComplete;
                const pct = Math.min(100, Math.round((val / q.target) * 100));
                const done = pct >= 100;
                return `<div class="quest-card">
                    <div class="quest-icon" style="background:${q.bg};color:${q.color}"><i class="fa-solid ${q.icon}"></i></div>
                    <div style="flex:1">
                        <div style="display:flex;justify-content:space-between;align-items:center">
                            <span style="font-weight:900;font-size:0.95rem">${q.label}</span>
                            <span style="font-size:0.7rem;font-weight:900;color:${done ? '#4ade80' : '#64748b'}">${done ? '✓ Done' : val+'/'+q.target}</span>
                        </div>
                        <div style="font-size:0.72rem;color:#64748b;margin-top:1px">${q.desc}</div>
                        <div class="quest-bar-bg"><div class="quest-bar-fill" style="width:${pct}%"></div></div>
                    </div>
                </div>`;
            }).join('');
        }

        // ── booklet ───────────────────────────────────────────────────
        const TYPE_COLORS = { pixel:'#a78bfa', typing:'#38bdf8', letter:'#4ade80', scramble:'#fb923c' };

        function renderBooklet() {
            const list = document.getElementById('bookletList');
            // only show levels the player has already seen (completed)
            const seen = DATA.slice(0, Math.max(1, state.levelIdx));
            document.getElementById('bookletCount').innerText = seen.length + ' words';
            list.innerHTML = seen.map(lvl => `
                <div class="booklet-card">
                    <div>
                        <div class="booklet-tag">${lvl.lessonId} · ${lvl.lessonTitle}</div>
                        <div class="booklet-word">${lvl.word} → <span style="color:var(--accent)">${lvl.answer}</span></div>
                        <div class="booklet-hint">${lvl.hint}</div>
                    </div>
                    <span class="booklet-type" style="background:${TYPE_COLORS[lvl.type]}22;color:${TYPE_COLORS[lvl.type]}">${lvl.type}</span>
                </div>`).join('');
        }

        // ── lesson intro & game ───────────────────────────────────────
        function showLessonIntro(idx) {
            const lvl = DATA[idx];
            document.getElementById('introTag').innerText = lvl.lessonId;
            document.getElementById('introTitle').innerText = lvl.lessonTitle;
            document.getElementById('introDesc').innerText = lvl.lessonDesc;
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('tabNav').classList.add('hidden');
            document.getElementById('lessonIntro').classList.remove('hidden');
        }

        function prepareNextLevel() { showLessonIntro(state.levelIdx); }

        function startGame() {
            document.getElementById('lessonIntro').classList.add('hidden');
            document.getElementById('homeScreen').classList.add('hidden');
            document.getElementById('gameUI').classList.remove('hidden');
            loadLevel();
        }

        function loadLevel() {
            const lvl = DATA[state.levelIdx];
            const container = document.getElementById('gameContainer');
            document.getElementById('mainBtn').disabled = true;
            state.currentInput = "";
            document.getElementById('progressBar').style.width = `${(state.levelIdx / DATA.length) * 100}%`;
            document.getElementById('stars').innerText = state.stars;

            let html = `<div class="text-center mt-2 mb-4">
                <h2 class="text-2xl font-black">${lvl.word}</h2>
                <p class="text-slate-500 font-bold text-xs uppercase tracking-widest mt-1">Hint: ${lvl.hint}</p>
            </div>`;

            if (lvl.type === 'pixel') {
                html += `<div class="pixel-grid" style="--pixel-color:${lvl.color}">`;
                for (let i = 0; i < 16; i++) {
                    html += `<div class="pixel-cube ${LETTER_ART[lvl.artTarget]?.includes(i) ? 'active' : ''}"></div>`;
                }
                html += `</div>`;
            }

            let displayVal = (lvl.type === 'letter' || lvl.type === 'pixel') ? '_'.repeat(lvl.answer.length) : '_';
            html += `<div class="input-display" id="disp">${displayVal}</div>`;
            html += renderKeyboard(lvl);
            container.innerHTML = html;
        }

        function renderKeyboard(lvl) {
            const ans = lvl.answer.toUpperCase();
            let keys = [...new Set(ans.split(''))];
            const alpha = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const fill = Math.ceil(keys.length * 1.5);
            let added = 0;
            while (added < fill) {
                let r = alpha[Math.floor(Math.random() * alpha.length)];
                if (!keys.includes(r)) { keys.push(r); added++; }
            }
            keys.sort(() => Math.random() - 0.5);
            let kb = `<div class="keyboard-grid">`;
            keys.forEach(k => kb += `<div onmousedown="pressKey('${k}')" class="key-btn">${k}</div>`);
            kb += `<div onmousedown="pressKey('DEL')" class="key-btn action">Del</div>`;
            kb += `<div onmousedown="pressKey('CLR')" class="key-btn action">Clr</div>`;
            kb += `</div>`;
            return kb;
        }

        function pressKey(k) {
            playBeep(400);
            const lvl = DATA[state.levelIdx];
            if (k === 'DEL') state.currentInput = state.currentInput.slice(0, -1);
            else if (k === 'CLR') state.currentInput = "";
            else {
                if (lvl.type === 'pixel' || lvl.type === 'letter') {
                    if (state.currentInput.length < lvl.answer.length) state.currentInput += k;
                } else {
                    state.currentInput += k;
                }
            }
            const disp = document.getElementById('disp');
            disp.innerText = lvl.type === 'letter'
                ? state.currentInput.padEnd(lvl.answer.length, '_')
                : (state.currentInput || '_');
            document.getElementById('mainBtn').disabled = state.currentInput.length === 0;
        }

        function handleAction() {
            const lvl = DATA[state.levelIdx];
            if (state.currentInput.toUpperCase() === lvl.answer.toUpperCase()) {
                state.stars += 10;
                state.levelIdx++;
                playBeep(800);
                if (state.levelIdx < DATA.length) {
                    DATA[state.levelIdx].isFirstOfLesson ? showLessonIntro(state.levelIdx) : loadLevel();
                } else {
                    showHome();
                }
            } else {
                const btn = document.getElementById('mainBtn');
                btn.classList.add('shake');
                playBeep(100);
                setTimeout(() => btn.classList.remove('shake'), 400);
            }
        }

        function playBeep(f) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.1);
        }
    </script>
</app>
