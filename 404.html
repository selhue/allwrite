<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Oops! You've taken a wrong turn. Let's get you back on track.">
    <title>Lost Your Way?</title>
    <style>
        /* Base Styles */
        :root {
            --primary-yellow: #FFC800;
            --light-yellow: #FFDE6B; 
            --dark-yellow: #E5A500;
            --text: #fafaff;
            --bg: #0f172a;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "DIN Round", "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text);
        }

        /* Container using attribute selector */
        [ui-component="container"] {
            text-align: center;
            max-width: 400px;
            padding: 40px;
        }

        /* Icon styling */
        [ui-visual="icon"] {
            font-size: 100px;
            margin-bottom: 20px;
            color: var(--primary-yellow);
            display: block;
        }

        /* Message using attribute selectors */
        [ui-text="title"] {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 16px;
            text-transform: lowercase;
        }

        [ui-text="body"] {
            font-size: 18px;
            line-height: 1.5;
            margin-bottom: 32px;
            color: #777;
        }

        /* Button using attribute selector */
        [ui-action="button"] {
            display: inline-block;
            background-color: var(--primary-yellow);
            color: var(--bg);
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 17px;
            text-transform: uppercase;
            
            /* Lighter border and dark bottom */
            border: 2px solid var(--light-yellow);
            border-bottom: 6px solid var(--dark-yellow);
            
            transition: all 0.1s;
        }

        [ui-action="button"]:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }
    </style>
</head>
<body>

    <div ui-component="container">
        <span ui-visual="icon">!</span>

        <h1 ui-text="title">you took a wrong turn!</h1>
        <p ui-text="body">
            This path seems wrong. Let's get you back to the right track so you can keep going :)
        </p>

        <a href="https://allwrite-sh.vercel.app/allow" ui-action="button">Take me back</a>
    </div>

</body>
</html>
