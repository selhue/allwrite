<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f7f7f7; color: #4b4b4b; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .btn-duo {
            background-color: #58cc02; color: white; border: none;
            border-bottom: 4px solid #46a302; padding: 12px 24px;
            font-size: 14px; font-weight: bold; border-radius: 12px;
            cursor: pointer; text-transform: uppercase; transition: all 0.1s;
        }
        .btn-duo:active { border-bottom: 0px; transform: translateY(4px); }

        .table-container { background: white; border-radius: 16px; border: 2px solid #e5e5e5; overflow: hidden; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 2px solid #e5e5e5; }
        th { background-color: #fff; color: #afafaf; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        
        .type-tag { background: #e5e5e5; color: #777; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: bold; }
        .answer-text { color: #58cc02; font-weight: bold; }
        .final-row { background-color: #fff9db; }
        .door-label { background: #1cb0f6; color: white; padding: 2px 8px; border-radius: 6px; font-size: 12px; white-space: nowrap; }
        .count-cell { color: #ccc; font-weight: bold; width: 30px; }
        /* Style for the question count per door */
        .q-badge { background: #ff9600; color: white; padding: 2px 6px; border-radius: 6px; font-size: 10px; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Question Renderer</h1>
        <button class="btn-duo" onclick="init()">Refresh Data</button>
    </div>

    <div id="main-renderer">
        <p>Loading questions...</p>
    </div>

    <script>
        const HARD_CODED_FINALS = {
            "0-0": { type:'choice', question:'Correct spelling of "Litle"', options:['Litle','Little','Littel'], answer:'Little' },
            "0-1": { type:'choice', question:'Correct spelling of "Ridding"', options:['Ridding','Riding','Riddng'], answer:'Riding' },
            "0-2": { type:'choice', question:'Choose the correct sentence', options:['i live in the philippines','I live in the Philippines','I live in the philippines'], answer:'I live in the Philippines' },
            "0-3": { type:'choice', question:'Choose the correct sentence', options:['my teacher is mr. santos','My teacher is Mr. Santos','My Teacher is Mr. santos'], answer:'My teacher is Mr. Santos' },
            "0-4": { type:'choice', question:'Fix the sentence: i have a sister named maria she is very kind', options:['I have a sister named Maria. She is very kind.','I have a sister named maria she is very kind','I have a sister named Maria she is very kind'], answer:'I have a sister named Maria. She is very kind.' },
            "1-0": { type:'choice', question:'What punctuation ends a sentence?', options:['.','?','!'], answer:'.' },
            "1-1": { type:'choice', question:'What punctuation asks a question?', options:['.','?','!'], answer:'?' },
            "1-2": { type:'choice', question:'What punctuation shows strong feeling?', options:['.','?','!'], answer:'!' },
            "1-3": { type:'choice', question:'Where are you now __', options:['.','?','!'], answer:'?' },
            "1-4": { type:'choice', question:'I am very happy __', options:['.','?','!'], answer:'!' },
            "2-0": { type:'choice', question:'Choose one familiar place', options:['Classroom','Home','Market','Playground'], answer:'Classroom' },
            "3-0": { type:'choice', question:'The ___ barks loudly.', options:['The dog','Anna','Sun'], answer:'The dog' },
            "3-1": { type:'choice', question:'___ writes a letter.', options:['Anna','Children','Sun'], answer:'Anna' },
            "3-2": { type:'choice', question:'The ___ play in the park.', options:['Children','Sun','Father'], answer:'Children' },
            "3-3": { type:'choice', question:'The ___ shines brightly.', options:['Sun','Dog','Father'], answer:'Sun' },
            "3-4": { type:'choice', question:'Choose correct sentence', options:['He run fast','He runs fast','He running fast'], answer:'He runs fast' },
            "4-0": { type:'choice', question:'Complete: I am ________.', options:['happy','run','book'], answer:'happy' },
            "4-1": { type:'choice', question:'Complete: I like ________.', options:['apples','sing','fast'], answer:'apples' },
            "4-2": { type:'choice', question:'Complete: I can ________.', options:['sing','apple','home'], answer:'sing' },
            "4-3": { type:'choice', question:'Expand: I eat.', options:['I eat rice at home.','I eat.','Eat I rice'], answer:'I eat rice at home.' },
            "4-4": { type:'choice', question:'Expand: She runs.', options:['She runs in the park.','She run park','She runs'], answer:'She runs in the park.' }
        };

        window.onload = init;

        async function init() {
            const container = document.getElementById('main-renderer');
            try {
                const response = await fetch('https://takamuratomokii-debug.github.io/t-js/api/data.js');
                const text = await response.text();
                const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonStr);
                render(data);
            } catch (e) {
                container.innerHTML = `<b style="color:red">Error loading API. Check console.</b>`;
                console.error(e);
            }
        }

        function render(data) {
            let html = `<div class="table-container"><table>
                <thead>
                    <tr>
                        <th style="width: 30px">#</th>
                        <th>Source (Door & Level)</th>
                        <th>Type</th>
                        <th>Question</th>
                        <th>Correct Answer</th>
                    </tr>
                </thead>
                <tbody>`;

            let globalCount = 1;

            // 1. Render API Questions
            data.doors.forEach(door => {
                let doorQuestionCount = 1; // Resets for each Door
                door.levels.forEach((level, lIdx) => {
                    level.questions.forEach(q => {
                        html += `<tr>
                            <td class="count-cell">${globalCount++}</td>
                            <td>
                                <span class="door-label">Door ${door.door} - Lv ${lIdx + 1}</span>
                                <span class="q-badge">Q${doorQuestionCount++}</span>
                            </td>
                            <td><span class="type-tag">${q.type}</span></td>
                            <td>${q.question}</td>
                            <td class="answer-text">${q.answer}</td>
                        </tr>`;
                    });
                });
            });

            // 2. Append Hard-Coded Finals
            let finalQuestionCount = 1; // Resets for Finals section
            Object.keys(HARD_CODED_FINALS).forEach(key => {
                const q = HARD_CODED_FINALS[key];
                html += `<tr class="final-row">
                    <td class="count-cell">${globalCount++}</td>
                    <td>
                        <span class="type-tag" style="background:#ffc107; color:#000;">FINAL ${key}</span>
                        <span class="q-badge" style="background:#777">Q${finalQuestionCount++}</span>
                    </td>
                    <td><span class="type-tag">${q.type}</span></td>
                    <td>${q.question}</td>
                    <td class="answer-text">${q.answer}</td>
                </tr>`;
            });

            html += `</tbody></table></div>`;
            document.getElementById('main-renderer').innerHTML = html;
        }
    </script>
</body>
</html>
