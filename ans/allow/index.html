<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson Data Table - Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; }
        /* Fixed pill styling for long text wrapping */
        .answer-pill { 
            background-color: #064e3b; 
            color: #6ee7b7; 
            border: 1px solid #065f46; 
            display: inline-block;
            white-space: normal;
            word-break: break-word;
            max-width: 250px; /* Limits width to keep table tidy */
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="p-6 font-sans text-slate-300">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-white">Answer Key Master List</h1>
        
        <div class="overflow-hidden border border-slate-800 rounded-xl shadow-2xl bg-slate-900">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800/50 border-b border-slate-800">
                        <tr>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Lesson</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Type</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Prompt</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500 text-emerald-400">Correct Answer</th>
                            <th class="p-4 text-xs font-bold uppercase text-slate-500">Hint</th>
                        </tr>
                    </thead>
                    <tbody id="data-table">
                        <tr>
                            <td colspan="5" class="p-12 text-center text-slate-500 animate-pulse">
                                Fetching lesson data...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const LESSONS = [
            { id: 1, key: 'Basics', icon: 'fa-feather', color: '#ffc800', border: '#ef9600', levels: [
                { title: 'Spelling', word: 'Choose the correct spelling:', answer: 'friend', type: 'word', hint: 'Which one looks right?' },
                { title: 'Spot the Error', word: 'Which word is correctly spelled?', answer: 'Little', type: 'word', hint: 'From the Little Red Riding Hood story' },
                { title: 'Capitalization', word: 'Which rewrite is correct? "i am from cagayan"', answer: 'I am from Cagayan', type: 'word', hint: 'Names of places are always capitalized' },
                { title: 'Editing', word: 'Which sentence is correctly written?', answer: 'My name is Carlo and I live in Cagayan.', type: 'word', hint: 'Check every name and the pronoun I' },
                { title: 'Write About Family.', word: 'Write 1-3 simple sentence.', answer: 'My family motivates me to learn.', type: 'write', hint: 'Start with a capital letter. End with a period.' }
            ]},
            { id: 2, key: 'Punctuation', icon: 'fa-scroll', color: '#58cc02', border: '#46a302', levels: [
                { title: 'Basic Marks', word: 'What is the use of a Period (.)?', answer: 'Ends a sentence', type: 'word', hint: 'Think about where you put a period' },
                { title: 'Identification', word: 'Which sentence uses the correct punctuation?', answer: 'Where is your bag?', type: 'word', hint: 'It is a question mark.' },
                { title: 'Editing', word: 'Complete: "That was incredible ___"', answer: 'That was incredible!', type: 'word', hint: 'It expresses strong emotion' },
                { title: 'Expressive Writing', word: 'Write a question about my favorite food.', answer: 'What is your favorite food?', type: 'write', hint: 'End your question with a question mark.' }
            ]},
            { id: 3, key: 'Vocabulary', icon: 'fa-book', color: '#ff4b4b', border: '#d33131', levels: [
                { title: 'Familiar Contexts', word: 'Which object would you see in a school?', answer: 'Textbook', type: 'word', hint: 'Used in class' },
                { title: 'Word Meanings', word: 'What is a "Farmer"?', answer: 'A person who grows crops', type: 'word', hint: 'Think about fields' },
                { title: 'Real Sentences', word: 'The scientist will ______ the results carefully.', answer: 'examine', type: 'word', hint: 'Look at something closely' },
                { title: 'Application', word: 'Use the word "Gifted" in a sentence.', answer: 'She is a gifted singer.', type: 'write', hint: 'Singing talent.' }
            ]},
            { id: 4, key: 'Grammar', icon: 'fa-pen-nib', color: '#1cb0f6', border: '#1899d6', levels: [
                { title: 'Build It Correctly', word: '"The dog barks loudly." — What is the subject?', answer: 'The dog', type: 'word', hint: 'Who or what the sentence is about' },
                { title: 'Time to Choose', word: 'The girls ______ singing.', answer: 'are', type: 'word', hint: 'Plural verb' },
                { title: 'Sentence Builder', word: 'Put in the correct order: [school] [He] [to] [goes]', answer: 'He goes to school.', type: 'word', hint: 'Subject then verb' },
                { title: 'Grammar Checking', word: 'Which sentence is grammatically correct?', answer: "Little Red Riding Hood goes to her grandmother's house.", type: 'word', hint: 'Singular verb form' }
            ]},
            { id: 5, key: 'Mastery', icon: 'fa-crown', color: '#ce82ff', border: '#a357d6', levels: [
                { title: 'Start with a Frame', word: 'Complete the frame: "I live in ______"', answer: 'I live in Quezon City.', type: 'word', hint: 'Natural and complete' },
                { title: 'Add More', word: 'Which sentence expands "She runs." with a detail?', answer: 'She runs in the park.', type: 'word', hint: 'Add a location' },
                { title: 'Link Ideas', word: 'Combine: "I like milk." + "I like juice."', answer: 'I like milk and I like juice.', type: 'word', hint: 'Connector for both' },
                { title: 'Put It Together', word: 'Write sentences about your family.', answer: 'My family is very important to me.', type: 'write', hint: 'Connect your ideas.' }
            ]}
        ];

        window.addEventListener('load', () => {
            const tableBody = document.getElementById('data-table');
            if (typeof LESSONS !== 'undefined') {
                tableBody.innerHTML = ''; 
                LESSONS.forEach(lesson => {
                    lesson.levels.forEach((level, index) => {
                        const row = document.createElement('tr');
                        row.className = "border-b border-slate-800 hover:bg-slate-800/30 transition-colors";
                        row.innerHTML = `
                            <td class="p-4 text-sm font-medium text-slate-200">
                                ${index === 0 ? `<span class="text-emerald-500 font-bold">${lesson.id}:</span> ${lesson.key}` : ''}
                            </td>
                            <td class="p-4 text-xs font-mono text-slate-500 uppercase tracking-wider">${level.type}</td>
                            <td class="p-4 text-sm text-slate-400">${level.word}</td>
                            <td class="p-4">
                                <span class="px-3 py-1 rounded-md text-xs font-bold answer-pill shadow-sm">
                                    ${level.answer}
                                </span>
                            </td>
                            <td class="p-4 text-xs italic text-slate-500 line-clamp-1 hover:line-clamp-none cursor-help">
                                ${level.hint}
                            </td>
                        `;
                        tableBody.appendChild(row);
                    });
                });
            }
        });
    </script>
</body>
</html>
