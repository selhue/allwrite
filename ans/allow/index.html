<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f7f7f7; }
        .controls { margin-bottom: 20px; }
        
        /* Duolingo Style Button */
        .btn-duo {
            background-color: #58cc02;
            color: white;
            border: none;
            border-bottom: 4px solid #46a302;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: filter 0.2s;
        }
        .btn-duo:active {
            border-bottom: 0px;
            margin-top: 4px;
        }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background-color: #fff; color: #afafaf; text-transform: uppercase; font-size: 12px; }
        .type-tag { background: #e5e5e5; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="btn-duo" onclick="fetchData()">Load API Data</button>
    </div>

    <div id="output">
        <p style="color: #999;">Click the button to load data from the API...</p>
    </div>

    <script>
        async function fetchData() {
            const output = document.getElementById('output');
            output.innerHTML = "Loading...";

            try {
                // Fetching from your specific URL
                const response = await fetch('https://takamuratomokii-debug.github.io/t-js/api/data.js');
                const text = await response.text();
                
                // Since the file is .js, we strip potential 'const data =' or similar if it's not pure JSON
                // If it is pure JSON, JSON.parse(text) works.
                const cleanJson = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(cleanJson);
                
                renderTable(data);
            } catch (error) {
                output.innerHTML = `<span style="color:red;">Error: ${error.message}</span>`;
            }
        }

        function renderTable(data) {
            let html = `<table>
                <thead>
                    <tr>
                        <th>Door</th>
                        <th>Level</th>
                        <th>Type</th>
                        <th>Question</th>
                        <th>Answer</th>
                        <th>Choices</th>
                    </tr>
                </thead>
                <tbody>`;

            data.doors.forEach(door => {
                door.levels.forEach(level => {
                    level.questions.forEach(q => {
                        html += `<tr>
                            <td><strong>${door.door}</strong></td>
                            <td>${level.title} (Lvl ${level.level})</td>
                            <td><span class="type-tag">${q.type.toUpperCase()}</span></td>
                            <td>${q.question}</td>
                            <td style="color: #58cc02; font-weight:bold;">${q.answer}</td>
                            <td>${q.choices ? q.choices.join(' | ') : 'N/A'}</td>
                        </tr>`;
                    });
                });
            });

            html += '</tbody></table>';
            document.getElementById('output').innerHTML = html;
        }

        fetchData();
    </script>
</body>
</html>
